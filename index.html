<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Assistente de Comunicações — TD Hotels Eventos</title>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
* { box-sizing:border-box; margin:0; padding:0; }
body { font-family:'Montserrat',Arial,sans-serif; background:#FAF8F6; color:#231F20; }
input,select,textarea { width:100%; border:1px solid #DDD4C8; border-radius:3px; padding:8px 12px; font-size:13px; background:#fff; color:#231F20; font-family:'Montserrat',Arial,sans-serif; outline:none; }
textarea { resize:vertical; line-height:1.6; }
button { cursor:pointer; font-family:'Montserrat',Arial,sans-serif; }
.field { margin-bottom:16px; }
.field label { display:block; font-size:10px; color:#9A918C; margin-bottom:5px; font-weight:600; letter-spacing:0.1em; text-transform:uppercase; }
.ftable { width:100%; border-collapse:collapse; font-size:12px; }
.ftable th { padding:7px 8px; font-size:10px; letter-spacing:0.08em; text-transform:uppercase; font-weight:600; text-align:right; }
.ftable th:first-child { text-align:left; }
.ftable td { padding:4px 6px; border-bottom:1px solid #F0EAE3; vertical-align:middle; }
.ftable .cinput { border:none; border-bottom:1px solid #DDD4C8; border-radius:0; padding:4px 6px; font-size:12px; background:transparent; width:100%; color:#231F20; font-family:'Montserrat',Arial,sans-serif; outline:none; }
.ftable .ninput { border:none; border-bottom:1px solid #DDD4C8; border-radius:0; padding:4px 6px; font-size:12px; background:transparent; width:100%; text-align:right; color:#231F20; font-family:'Montserrat',Arial,sans-serif; outline:none; }
.ftable td.calc { text-align:right; color:#231F20; padding:4px 8px; }
.ftable tr.total-row td { background:#231F20; color:#fff; font-weight:600; padding:7px 8px; font-size:11px; text-align:right; }
.ftable tr.total-row td:first-child { text-align:left; }
.sect-hdr { padding:7px 8px; font-weight:700; font-size:11px; letter-spacing:0.06em; text-transform:uppercase; }
.info-box { background:#F0EAE3; border-left:3px solid #887157; padding:12px 16px; border-radius:0 3px 3px 0; font-size:11px; line-height:1.8; color:#5A5250; margin-bottom:12px; }
.info-box strong { color:#231F20; }
.diag-result { border-radius:3px; padding:14px 18px; font-size:12px; line-height:1.8; margin-top:8px; }
.diag-ok  { background:#F0FAF4; border:1px solid #27ae60; }
.diag-err { background:#FEF5F5; border:1px solid #e74c3c; }
.diag-warn{ background:#FFFBF0; border:1px solid #f39c12; }
.etoggle { display:flex; border:1px solid #DDD4C8; border-radius:3px; overflow:hidden; margin-bottom:20px; }
.etoggle button { flex:1; padding:10px 8px; border:none; background:#fff; font-size:11px; font-weight:600; color:#9A918C; letter-spacing:0.06em; text-transform:uppercase; border-right:1px solid #DDD4C8; transition:background 0.15s,color 0.15s; }
.etoggle button:last-child { border-right:none; }
.etoggle button.active { background:#231F20; color:#fff; }
.ftab-btn { background:transparent; border:none; border-bottom:2px solid transparent; margin-bottom:-2px; padding:10px 20px; font-size:11px; font-weight:600; letter-spacing:0.08em; text-transform:uppercase; color:#9A918C; }
.ftab-btn.active { border-bottom-color:#887157; color:#231F20; }
</style>
</head>
<body>

<!-- HEADER -->
<div style="background:#231F20;padding:0 28px;display:flex;align-items:center;justify-content:space-between;height:64px;border-bottom:2px solid #887157;">
  <div style="display:flex;align-items:center;gap:14px;">
    <a href="#" onclick="goHome();return false;" style="display:flex;align-items:center;text-decoration:none;">
      <img src="./FOTOS/lg_1080x1080px_td_hotels.png" alt="TD Hotels" style="height:38px;width:auto;display:block;" onerror="this.style.display='none';document.getElementById('logo-fb').style.display='flex';">
      <div id="logo-fb" style="display:none;border:1px solid #fff;padding:4px 8px;">
        <div style="color:#fff;font-weight:700;font-size:18px;line-height:1;">TD</div>
        <div style="color:#fff;font-weight:300;font-size:7px;letter-spacing:0.2em;margin-top:2px;">HOTELS</div>
      </div>
    </a>
    <div style="border-left:1px solid #887157;padding-left:12px;">
      <div style="color:#fff;font-size:10px;letter-spacing:0.15em;text-transform:uppercase;font-weight:400;" id="hdr-events">Departamento de Eventos</div>
      <div style="color:#887157;font-size:9px;letter-spacing:0.1em;text-transform:uppercase;font-weight:300;">HCTA · CCTA</div>
    </div>
  </div>
  <div style="display:flex;gap:6px;">
    <button onclick="setLang('PT')" id="btn-pt" style="background:#887157;color:#fff;border:1px solid #887157;border-radius:2px;padding:4px 14px;font-size:11px;font-weight:600;">PT</button>
    <button onclick="setLang('EN')" id="btn-en" style="background:transparent;color:#9A918C;border:1px solid #3A3636;border-radius:2px;padding:4px 14px;font-size:11px;font-weight:600;">EN</button>
  </div>
</div>
<div style="height:3px;background:linear-gradient(90deg,#887157 0%,#C4AE96 50%,transparent 100%);"></div>

<!-- LAYOUT -->
<div style="display:grid;grid-template-columns:230px 1fr;min-height:calc(100vh - 69px);">

  <!-- SIDEBAR -->
  <div style="background:#F5F1EC;border-right:1px solid #DDD4C8;position:relative;">
    <div style="padding:20px 16px 10px;font-size:9px;letter-spacing:0.15em;text-transform:uppercase;color:#9A918C;font-weight:600;" id="sidebar-title">Navegação</div>
    <div id="menu"></div>
    <div style="position:absolute;bottom:0;width:100%;padding:14px 16px;border-top:1px solid #DDD4C8;background:#F5F1EC;">
      <div style="font-size:9px;color:#9A918C;letter-spacing:0.08em;line-height:1.8;">HCTA · CCTA · TD Hotels<br><span style="color:#887157;">Departamento de Eventos</span></div>
    </div>
  </div>

  <!-- MAIN -->
  <div style="padding:32px 36px;">

    <!-- LANDING -->
    <div id="landing" style="display:block;">
      <div style="text-align:center;max-width:620px;margin:40px auto 0;">
        <div style="font-size:10px;color:#887157;letter-spacing:0.2em;text-transform:uppercase;font-weight:600;margin-bottom:16px;">TD Hotels · HCTA · CCTA</div>
        <div style="font-size:24px;color:#231F20;font-weight:300;margin-bottom:6px;" id="land-title">Bem-vindo ao Assistente de Comunicações</div>
        <div style="font-size:13px;color:#887157;font-weight:500;margin-bottom:14px;" id="land-subtitle">Departamento de Eventos · HCTA / CCTA</div>
        <div style="width:48px;height:1px;background:#887157;margin:0 auto 20px;"></div>
        <div style="font-size:13px;color:#5A5250;line-height:1.7;margin-bottom:12px;text-align:left;" id="land-desc"></div>
        <div style="font-size:12px;color:#9A918C;margin-bottom:28px;text-align:left;" id="land-cta"></div>
        <div id="cards-grid" style="display:flex;flex-direction:column;gap:8px;"></div>
        <div style="margin-top:28px;font-size:9px;color:#C4AE96;letter-spacing:0.04em;" id="land-dev"></div>
      </div>
    </div>

    <!-- FORM -->
    <div id="formview" style="display:none;">
      <div style="max-width:520px;">
        <div style="margin-bottom:16px;">
          <a href="#" onclick="goHome();return false;" style="font-size:11px;color:#887157;text-decoration:none;letter-spacing:0.06em;text-transform:uppercase;font-weight:600;" id="back-lbl">← Voltar</a>
        </div>
        <div style="margin-bottom:24px;">
          <div style="font-size:11px;color:#887157;letter-spacing:0.12em;text-transform:uppercase;font-weight:600;margin-bottom:6px;" id="form-subtitle"></div>
          <div style="font-size:18px;color:#231F20;font-weight:300;" id="form-title"></div>
          <div style="width:40px;height:1px;background:#887157;margin-top:10px;"></div>
        </div>
        <div id="form-fields"></div>
        <div style="margin-top:4px;font-size:10px;color:#9A918C;" id="req-note">* campos obrigatórios</div>
        <button id="generate-btn" onclick="generateEmail()" style="background:#231F20;color:#fff;border:1px solid #887157;border-radius:3px;padding:10px 28px;font-size:11px;font-weight:600;letter-spacing:0.1em;text-transform:uppercase;margin-top:12px;opacity:0.4;cursor:not-allowed;" disabled></button>
      </div>
    </div>

    <!-- RESULT -->
    <div id="resultview" style="display:none;">
      <div style="display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:24px;">
        <div>
          <div style="font-size:11px;color:#887157;letter-spacing:0.12em;text-transform:uppercase;font-weight:600;margin-bottom:6px;" id="result-label"></div>
          <div style="font-size:18px;color:#231F20;font-weight:300;" id="result-title"></div>
          <div style="width:40px;height:1px;background:#887157;margin-top:10px;"></div>
        </div>
        <div style="display:flex;gap:10px;margin-top:4px;">
          <button onclick="copyEmail()" id="copy-btn" style="background:#887157;color:#fff;border:none;border-radius:3px;padding:9px 22px;font-size:12px;font-weight:600;letter-spacing:0.08em;text-transform:uppercase;"></button>
          <button onclick="backToForm()" id="edit-btn" style="background:transparent;border:1px solid #DDD4C8;color:#5A5250;border-radius:3px;padding:9px 18px;font-size:11px;letter-spacing:0.06em;text-transform:uppercase;"></button>
        </div>
      </div>
      <div id="email-preview" style="background:#fff;border:1px solid #DDD4C8;border-radius:3px;padding:28px 32px;box-shadow:0 1px 8px rgba(35,31,32,0.06);"></div>
    </div>

    <!-- FISCAL -->
    <div id="fiscalview" style="display:none;">
      <div style="margin-bottom:16px;">
        <a href="#" onclick="goHome();return false;" style="font-size:11px;color:#887157;text-decoration:none;letter-spacing:0.06em;text-transform:uppercase;font-weight:600;" id="fiscal-back-lbl">← Voltar</a>
      </div>
      <div style="display:flex;gap:0;border-bottom:2px solid #DDD4C8;margin-bottom:28px;">
        <button class="ftab-btn active" id="ftab-calc" onclick="fiscalTab('calc')" id="ftab-calc"></button>
        <button class="ftab-btn" id="ftab-diag" onclick="fiscalTab('diag')"></button>
        <button class="ftab-btn" id="ftab-info" onclick="fiscalTab('info')"></button>
      </div>

      <!-- CALC -->
      <div id="tab-calc">
        <div style="max-width:820px;">
          <div style="font-size:18px;color:#231F20;font-weight:300;margin-bottom:6px;" id="fc-title"></div>
          <div style="width:40px;height:1px;background:#887157;margin-bottom:20px;"></div>
          <div style="margin-bottom:8px;font-size:10px;color:#9A918C;font-weight:600;letter-spacing:0.1em;text-transform:uppercase;" id="fc-entity-lbl"></div>
          <div class="etoggle">
            <button id="ent-pub" class="active" onclick="setEntity('pub')"></button>
            <button id="ent-priv" onclick="setEntity('priv')"></button>
          </div>
          <div id="entity-note" style="font-size:11px;color:#887157;margin-bottom:20px;padding:8px 12px;background:#F5F1EC;border-radius:3px;border-left:3px solid #887157;"></div>

          <!-- FORA HOTELARIA -->
          <div style="margin-bottom:24px;">
            <div class="sect-hdr" id="sh-fora" style="background:#C0392B;color:#fff;"></div>
            <table class="ftable">
              <thead><tr style="background:#E8E0D8;">
                <th style="width:34%;padding:7px 8px;" id="th-c1"></th>
                <th style="width:18%;" id="th-pf1"></th>
                <th style="width:18%;" id="th-bi1"></th>
                <th style="width:15%;" id="th-iva1"></th>
                <th style="width:15%;" id="th-ret1"></th>
              </tr></thead>
              <tbody id="tbody-fora"></tbody>
              <tfoot><tr class="total-row">
                <td id="tf-lbl1" style="text-align:left;"></td>
                <td id="tf-fora-pf">0,00</td>
                <td></td>
                <td id="tf-fora-iva">0,00</td>
                <td id="tf-fora-ret">—</td>
              </tr></tfoot>
            </table>
          </div>

          <!-- HOTELARIA -->
          <div style="margin-bottom:24px;">
            <div class="sect-hdr" id="sh-hot" style="background:#1a6b3a;color:#fff;"></div>
            <table class="ftable">
              <thead><tr style="background:#E8E0D8;">
                <th style="width:34%;padding:7px 8px;" id="th-c2"></th>
                <th style="width:18%;" id="th-pf2"></th>
                <th style="width:18%;" id="th-bi2"></th>
                <th style="width:15%;" id="th-iva2"></th>
                <th style="width:15%;" id="th-ret2"></th>
              </tr></thead>
              <tbody id="tbody-hot"></tbody>
              <tfoot><tr class="total-row">
                <td id="tf-lbl2" style="text-align:left;"></td>
                <td id="tf-hot-pf">0,00</td>
                <td></td>
                <td id="tf-hot-iva">0,00</td>
                <td>—</td>
              </tr></tfoot>
            </table>
          </div>

          <!-- TOTAL BOX -->
          <div style="background:#231F20;color:#fff;padding:14px 18px;border-radius:3px;margin-bottom:20px;">
            <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:6px;">
              <span style="font-size:10px;letter-spacing:0.1em;text-transform:uppercase;color:#9A918C;" id="lbl-tg"></span>
              <span style="font-size:14px;font-weight:600;" id="grand-pf">0,00 Kzs</span>
            </div>
            <div id="grand-breakdown" style="font-size:11px;color:#9A918C;line-height:2;"></div>
            <div style="border-top:1px solid #3A3636;margin:10px 0;"></div>
            <div style="display:flex;justify-content:space-between;align-items:center;">
              <span style="font-size:11px;font-weight:600;color:#887157;" id="lbl-tr"></span>
              <span style="font-size:18px;font-weight:700;color:#887157;" id="grand-receber">0,00 Kzs</span>
            </div>
          </div>

          <button id="btn-reset" onclick="resetCalc()" style="background:transparent;border:1px solid #DDD4C8;color:#5A5250;border-radius:3px;padding:8px 20px;font-size:11px;letter-spacing:0.06em;text-transform:uppercase;"></button>

          <div style="margin-top:20px;font-size:10px;color:#9A918C;line-height:1.8;border-top:1px solid #DDD4C8;padding-top:14px;" id="calc-legal"></div>
        </div>
      </div>

      <!-- DIAG -->
      <div id="tab-diag" style="display:none;">
        <div style="max-width:560px;">
          <div style="font-size:18px;color:#231F20;font-weight:300;margin-bottom:6px;" id="fd-title"></div>
          <div style="width:40px;height:1px;background:#887157;margin-bottom:16px;"></div>
          <div style="font-size:12px;color:#5A5250;margin-bottom:20px;line-height:1.7;" id="fd-desc"></div>
          <div style="margin-bottom:8px;font-size:10px;color:#9A918C;font-weight:600;letter-spacing:0.1em;text-transform:uppercase;" id="fd-entity-lbl"></div>
          <div class="etoggle">
            <button id="dent-pub" class="active" onclick="setDiagEntity('pub')"></button>
            <button id="dent-priv" onclick="setDiagEntity('priv')"></button>
          </div>
          <div style="display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:16px;">
            <div class="field"><label id="fd-lbl-pf"></label><input type="text" id="diag-pf" oninput="diagCalc()"></div>
            <div class="field"><label id="fd-lbl-paid"></label><input type="text" id="diag-paid" oninput="diagCalc()"></div>
          </div>
          <div style="display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:16px;">
            <div class="field"><label id="fd-lbl-fora"></label><input type="text" id="diag-fora" oninput="diagCalc()"></div>
            <div class="field"><label id="fd-lbl-hot"></label><input type="text" id="diag-hot" oninput="diagCalc()"></div>
          </div>
          <div id="diag-result-area"></div>
        </div>
      </div>

      <!-- INFO -->
      <div id="tab-info" style="display:none;">
        <div style="max-width:680px;" id="info-content"></div>
      </div>
    </div>

  </div>
</div>

function renderCalc(){
  renderTable('tbody-fora', foraRows, 14, entityType==='pub');
  renderTable('tbody-hot',  hotRows,  7,  false);
  updateTotals();
}

function renderTable(tbodyId, rows, ivaPct, showRet){
  var tbody=$(tbodyId); if(!tbody) return;
  var ph=T('ph-conceito');
  tbody.innerHTML='';
  rows.forEach(function(row,i){
    var isHot=(tbodyId==='tbody-hot');
    var base=row.valor>0?(row.valor/(1+ivaPct/100)):0;
    var iva=base*(ivaPct/100);
    var ret=showRet?base*0.065:0;
    var tr=document.createElement('tr');
    tr.innerHTML=
      '<td style="background:#F5FFF5;"><input class="cinput" type="text" value="'+escHtml(row.conceito)+'" placeholder="'+ph+'" onchange="rowUpdate(\''+tbodyId+'\','+i+',\'conceito\',this.value)"></td>'
      +'<td style="background:#F5FFF5;"><input class="ninput" type="text" value="'+(row.valor?fmt(row.valor):'')+'" placeholder="0,00" onchange="rowUpdate(\''+tbodyId+'\','+i+',\'valor\',this.value)"></td>'
      +'<td class="calc">'+(row.valor>0?fmt(base):'0,00')+'</td>'
      +'<td class="calc" style="color:'+(ivaPct===14?'#C0392B':'#1a6b3a')+';font-weight:500;">'+(row.valor>0?fmt(iva):'0,00')+'</td>'
      +'<td class="calc" style="color:'+(showRet&&row.valor>0?'#231F20':'#C4AE96')+'">'+(showRet&&row.valor>0?fmt(ret):'—')+'</td>';
    tbody.appendChild(tr);
  });
}

function escHtml(s){ return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

function rowUpdate(tbodyId,idx,key,val){
  var rows=(tbodyId==='tbody-hot')?hotRows:foraRows;
  if(key==='valor') rows[idx].valor=parseNum(val);
  else rows[idx][key]=val;
  renderCalc();
}

function updateTotals(){
  var showRet=entityType==='pub';
  var foraPF=0,foraIVA=0,foraRet=0;
  foraRows.forEach(function(r){ if(r.valor>0){ var b=r.valor/1.14; foraPF+=r.valor; foraIVA+=b*0.14; if(showRet) foraRet+=b*0.065; } });
  var hotPF=0,hotIVA=0;
  hotRows.forEach(function(r){ if(r.valor>0){ var b=r.valor/1.07; hotPF+=r.valor; hotIVA+=b*0.07; } });

  setText('tf-fora-pf',fmt(foraPF));
  setText('tf-fora-iva',fmt(foraIVA));
  setText('tf-fora-ret',showRet?fmt(foraRet):'—');
  setText('tf-hot-pf',fmt(hotPF));
  setText('tf-hot-iva',fmt(hotIVA));

  var totalPF=foraPF+hotPF;
  var catIVA=showRet?foraIVA:0;
  var totalRet=showRet?foraRet:0;
  var totalReceber=totalPF-catIVA-totalRet;

  setText('grand-pf',fmt(totalPF)+' Kzs');
  var bd='';
  if(showRet){
    bd+='<div style="display:flex;justify-content:space-between;"><span>'+T('deduct-cat14')+'</span><span style="color:#e74c3c;">— '+fmt(catIVA)+' Kzs</span></div>';
    if(foraRet>0) bd+='<div style="display:flex;justify-content:space-between;"><span>'+T('deduct-ret')+'</span><span style="color:#e74c3c;">— '+fmt(totalRet)+' Kzs</span></div>';
  } else {
    if(foraRet>0) bd+='<div style="display:flex;justify-content:space-between;"><span>'+T('deduct-ret')+'</span><span style="color:#e74c3c;">— '+fmt(totalRet)+' Kzs</span></div>';
    else bd+='<div style="color:#9A918C;font-size:10px;">'+T('deduct-none')+'</div>';
  }
  $('grand-breakdown').innerHTML=bd;
  setText('grand-receber',fmt(totalReceber)+' Kzs');
}

// ─── DIAGNÓSTICO ──────────────────────────────────────────────
function diagCalc(){
  var pfVal=parseNum($('diag-pf').value);
  var paidVal=parseNum($('diag-paid').value);
  var foraVal=parseNum($('diag-fora').value);
  var hotVal=parseNum($('diag-hot').value);
  var area=$('diag-result-area');
  if(!pfVal||!paidVal){ area.innerHTML=''; return; }
  if(foraVal===0&&hotVal===0) hotVal=pfVal;

  var diff=pfVal-paidVal;
  var isPub=diagEntityType==='pub';
  var msgs=[], identified=false;
  var TOL=2;

  var foraBase=foraVal/1.14, foraIVA=foraBase*0.14, foraRet=foraBase*0.065;
  var hotBase=hotVal/1.07,   hotIVA=hotBase*0.07;
  var expDeduct=isPub?(foraIVA+foraRet):foraRet;
  var expPaid=pfVal-expDeduct;

  if(Math.abs(paidVal-expPaid)<TOL){
    msgs.push({t:'ok', txt:p()
      ?'✅ O cálculo está <strong>correcto</strong>. O cliente aplicou correctamente '+(isPub?'a cativação de IVA (14%) sobre os serviços fora da hotelaria e a retenção de Imposto Industrial (6,5%) sobre a base de incidência.':'a retenção de Imposto Industrial (6,5%) sobre a base de incidência dos serviços fora do âmbito da hotelaria.')
      :'✅ The calculation is <strong>correct</strong>. The client correctly applied '+(isPub?'VAT withholding (14%) on non-hotel services and the 6.5% Industrial Tax retention on the tax base.':'the 6.5% Industrial Tax retention on the tax base of non-hotel services.')});
  } else {
    // Test 1: private trying to deduct VAT
    if(!isPub&&Math.abs(diff-foraIVA)<TOL){
      msgs.push({t:'err',txt:p()
        ?'❌ A entidade privada <strong>não pode fazer cativação de IVA</strong>. A cativação é exclusiva de agentes cativadores (Estado e organismos públicos), ao abrigo da Lei 7/19 e Lei 17/19. O valor correcto a receber seria <strong>'+fmt(expPaid)+' Kzs</strong>.'
        :'❌ A private entity <strong>cannot withhold VAT</strong>. VAT withholding is exclusive to withholding agents (State and public bodies) under Law 7/19 and Law 17/19. The correct amount to receive would be <strong>'+fmt(expPaid)+' Kzs</strong>.'});
      identified=true;
    }
    // Test 2: retention applied to hotel services
    if(!identified){
      var retHotBase=hotBase*0.065, retHotFull=hotVal*0.065;
      if(Math.abs(diff-retHotBase)<TOL||Math.abs(diff-retHotFull)<TOL||Math.abs(diff-(foraRet+retHotBase))<TOL){
        msgs.push({t:'err',txt:p()
          ?'❌ O cliente aplicou retenção de Imposto Industrial sobre <strong>serviços de hotelaria</strong>, o que <strong>não é permitido por lei</strong>. Os serviços de hotelaria e similares não estão sujeitos a retenção na fonte, ao abrigo da Lei 19/14 e Lei 26/20 (art.º 67.º). O valor correcto a receber seria <strong>'+fmt(expPaid)+' Kzs</strong>.'
          :'❌ The client applied Industrial Tax retention to <strong>hotel services</strong>, which is <strong>not permitted by law</strong>. Hotel and similar services are not subject to withholding tax under Law 19/14 and Law 26/20 (art. 67). The correct amount to receive would be <strong>'+fmt(expPaid)+' Kzs</strong>.'});
        identified=true;
      }
    }
    // Test 3: retention calculated on full value (with VAT) instead of tax base
    if(!identified){
      var retFullFora=foraVal*0.065, retFullAll=pfVal*0.065;
      if(Math.abs(diff-retFullFora)<TOL||Math.abs(diff-retFullAll)<TOL){
        msgs.push({t:'err',txt:p()
          ?'❌ A retenção de 6,5% foi calculada sobre o <strong>valor com IVA</strong> em vez da <strong>base de incidência</strong> (valor sem IVA). Fórmula correcta: Base = Valor Proforma ÷ (1 + taxa IVA). A retenção correcta seria <strong>'+fmt(foraRet)+' Kzs</strong> e o total a receber <strong>'+fmt(expPaid)+' Kzs</strong>.'
          :'❌ The 6.5% retention was calculated on the <strong>value including VAT</strong> instead of the <strong>tax base</strong> (value excluding VAT). Correct formula: Base = Invoice Value ÷ (1 + VAT rate). The correct retention would be <strong>'+fmt(foraRet)+' Kzs</strong> and the total to receive <strong>'+fmt(expPaid)+' Kzs</strong>.'});
        identified=true;
      }
    }
    // Test 4: pub entity withholding on hotel services
    if(!identified&&isPub){
      if(Math.abs(diff-(foraIVA+hotIVA+foraRet))<TOL||Math.abs(diff-(foraIVA+hotIVA))<TOL){
        msgs.push({t:'err',txt:p()
          ?'❌ O cliente aplicou cativação de IVA sobre <strong>serviços de hotelaria</strong>. O IVA dos serviços de hotelaria deve ser pago na totalidade. A cativação aplica-se apenas a serviços fora do âmbito da hotelaria. O valor correcto a receber seria <strong>'+fmt(expPaid)+' Kzs</strong>.'
          :'❌ The client applied VAT withholding on <strong>hotel services</strong>. VAT on hotel services must be paid in full. Withholding only applies to non-hotel services. The correct amount to receive would be <strong>'+fmt(expPaid)+' Kzs</strong>.'});
        identified=true;
      }
    }
    if(!identified){
      var pct=(diff/pfVal*100).toFixed(2);
      msgs.push({t:'warn',txt:p()
        ?'⚠️ O valor deduzido (<strong>'+fmt(diff)+' Kzs</strong>, equivalente a '+pct+'% da proforma) não corresponde a nenhum cenário de retenção ou cativação padrão. Recomenda-se verificar os detalhes com o cliente. O valor teoricamente correcto a receber seria <strong>'+fmt(expPaid)+' Kzs</strong>.'
        :'⚠️ The deducted amount (<strong>'+fmt(diff)+' Kzs</strong>, equivalent to '+pct+'% of the invoice) does not match any standard retention or withholding scenario. Please verify the details with the client. The theoretically correct amount to receive would be <strong>'+fmt(expPaid)+' Kzs</strong>.'});
    }
  }

  var html='';
  msgs.forEach(function(m){ html+='<div class="diag-result diag-'+(m.t==='ok'?'ok':m.t==='err'?'err':'warn')+'">'+m.txt+'</div>'; });

  // breakdown
  html+='<div style="margin-top:16px;background:#fff;border:1px solid #DDD4C8;border-radius:3px;padding:14px 18px;font-size:11px;line-height:2;">';
  html+='<div style="font-size:10px;color:#887157;font-weight:700;letter-spacing:0.1em;text-transform:uppercase;margin-bottom:8px;">'+T('diag-breakdown')+'</div>';
  html+='<div style="display:flex;justify-content:space-between;"><span>'+T('diag-proforma')+'</span><span><strong>'+fmt(pfVal)+' Kzs</strong></span></div>';
  html+='<div style="display:flex;justify-content:space-between;"><span>'+T('diag-received')+'</span><span><strong>'+fmt(paidVal)+' Kzs</strong></span></div>';
  html+='<div style="display:flex;justify-content:space-between;color:#e74c3c;"><span>'+T('diag-deducted')+'</span><span><strong>— '+fmt(diff)+' Kzs</strong></span></div>';
  html+='<div style="border-top:1px solid #DDD4C8;margin:8px 0;"></div>';
  if(foraVal>0) html+='<div style="display:flex;justify-content:space-between;color:#9A918C;"><span>'+T('diag-ret-correct')+'</span><span>'+fmt(foraRet)+' Kzs</span></div>';
  if(isPub&&foraVal>0) html+='<div style="display:flex;justify-content:space-between;color:#9A918C;"><span>'+T('diag-cat-correct')+'</span><span>'+fmt(foraIVA)+' Kzs</span></div>';
  html+='<div style="display:flex;justify-content:space-between;font-weight:600;color:#1a6b3a;"><span>'+T('diag-total-correct')+'</span><span>'+fmt(expPaid)+' Kzs</span></div>';
  html+='</div>';
  area.innerHTML=html;
}

  +'<div style="margin-bottom:20px;"><div style="font-size:11px;color:#887157;letter-spacing:0.12em;text-transform:uppercase;font-weight:700;margin-bottom:10px;">'+(is?'Base de Incidência':'Tax Base')+'</div>'

  +'<div style="margin-bottom:8px;">⚠️ <strong>'+(is?'Retenção sobre serviços de hotelaria':'Retention on hotel services')+'</strong> — '+(is?'não permitido por lei. A retenção de 6,5% aplica-se apenas a serviços fora do âmbito da hotelaria.':'not permitted by law. The 6.5% retention only applies to non-hotel services.')+'</div>'
  +'<div style="margin-bottom:8px;">⚠️ <strong>'+(is?'Retenção calculada sobre o valor com IVA':'Retention calculated on value including VAT')+'</strong> — '+(is?'a retenção incide sobre a base de incidência (valor sem IVA), não sobre o valor total da proforma.':'retention is calculated on the tax base (value excluding VAT), not on the total invoice value.')+'</div>'

// ─── EMAIL FORM ───────────────────────────────────────────────
function fld(label,html){ return '<div class="field"><label>'+label+'</label>'+html+'</div>'; }
function inp(id,ph,val){ return '<input type="text" id="'+id+'" placeholder="'+(ph||'')+'" value="'+(val||'')+'" oninput="fields[\''+id+'\']=this.value;validateForm()">'; }
function sel(id,opts,val){
  var o=opts.map(function(x){ return '<option value="'+x.v+'"'+((val||opts[0].v)===x.v?' selected':'')+'>'+x.l+'</option>'; }).join('');
  return '<select id="'+id+'" onchange="fields[\''+id+'\']=this.value;renderFields()">'+o+'</select>';
}
function req(){ return '<span style="color:#C0392B;margin-left:3px;">*</span>'; }

function getRequired(){
  if(curType==='pedido_cotacao') return ['nome'];
  if(curType==='envio_proposta') return ['nome','numEvento','datas'];
  if(curType==='follow_up') return ['nome','dataEvento'];
  if(curType==='confirmacao'){
    var base=['nome','dataEvento'];
    return (fields.dadosFiscaisOpcao||'conhecidos')==='conhecidos'?base.concat(['entidade','nif','morada']):base;
  }
  if(curType==='cobranca') return ['nome','dataEvento'];
  if(curType==='satisfacao') return ['nome'];
  return [];
}

function validateForm(){
  var btn=$('generate-btn'); if(!btn) return;
  var missing=getRequired().filter(function(k){ return !fields[k]||!fields[k].trim(); });
  btn.disabled=missing.length>0;
  btn.style.opacity=missing.length>0?'0.4':'1';
  btn.style.cursor=missing.length>0?'not-allowed':'pointer';
}

function renderFields(){
  if(!curType) return;
  var f=fields, is=p();
  var t=TYPES.find(function(x){ return x.id===curType; });
  setText('form-subtitle',is?t.dpt:t.den);
  setText('form-title',is?t.pt:t.en);
  setText('generate-btn',T('generate'));
  setText('req-note',T('req-note'));
  setText('back-lbl',T('back'));

  var nameFld=fld((is?'Nome do destinatário':'Recipient name')+req(),inp('nome',is?'Ex: Dra. Ana Silva':'e.g. Ms. Ana Silva',f.nome));
  var dataFld=fld((is?'Data do evento':'Event date')+req(),inp('dataEvento',is?'Ex: 14 de Julho de 2026':'e.g. 14 July 2026',f.dataEvento));
  var html='';

  if(curType==='pedido_cotacao'){
    html+=fld(is?'Tipo de pedido':'Request type',sel('subtypeSel',[
      {v:'geral',l:is?'Pedido geral — cliente sem detalhes':'General — client with no details'},
      {v:'incompleto',l:is?'Pedido incompleto — falta informação':'Incomplete — missing information'}
    ],curSubtype));
    html+=nameFld;
    if(curSubtype==='incompleto'){
      html+=fld(is?'Email do cliente':'Client email','<textarea id="clientTA" rows="5" placeholder="'+(is?'Cola o email original do cliente aqui...':'Paste the client\'s original email here...')+'" oninput="clientTxt=this.value">'+(clientTxt||'')+'</textarea>');
      html+='<button onclick="extractData()" id="extract-btn" style="margin-bottom:16px;background:transparent;border:1px solid '+BRONZE+';color:'+BRONZE+';border-radius:3px;padding:7px 16px;font-size:11px;font-weight:600;letter-spacing:0.08em;text-transform:uppercase;">'+(is?'Extrair dados automaticamente':'Extract data automatically')+'</button>';
      html+='<div id="extract-result"></div>';
    }
  } else if(curType==='envio_proposta'){
    html+=fld(is?'Espaço e regime':'Venue and regime',sel('espacoTipo',[
      {v:'hcta',l:'Hotel de Convenções de Talatona (HCTA)'},
      {v:'ccta_excl',l:is?'CCTA — Com exclusividade':'CCTA — Exclusive'},
      {v:'ccta_sem',l:is?'CCTA — Sem exclusividade':'CCTA — Non-exclusive'}
    ],f.espacoTipo||'hcta'));
    html+=nameFld;
    html+=fld((is?'Nº e nome do evento':'Event number and name')+req(),inp('numEvento',is?'Ex: 922/26 — Conferência Anual BAI':'e.g. 922/26 — Annual BAI Conference',f.numEvento));
    html+=fld((is?'Datas':'Dates')+req(),inp('datas',is?'Ex: 12 e 13 de Junho de 2026':'e.g. 12 and 13 June 2026',f.datas));
    html+=fld(is?'Situação da proposta':'Proposal status',sel('segundaOpcao',[
      {v:'nao',l:is?'1ª opção':'First option'},
      {v:'sim',l:is?'2ª opção — existe pré-reserva anterior':'2nd option — prior pre-booking exists'}
    ],f.segundaOpcao||'nao'));
  } else if(curType==='follow_up'){
    html+=nameFld; html+=dataFld;
    html+=fld(is?'Motivo':'Reason',sel('followUpModo',[
      {v:'proximo',l:is?'Data a aproximar-se — urgência de confirmação':'Date approaching — confirmation urgency'},
      {v:'conflito',l:is?'Novo pedido para as mesmas datas':'New request for same dates'}
    ],f.followUpModo||'proximo'));
    if((f.followUpModo||'proximo')!=='conflito'){
      html+=fld(is?'Data limite de confirmação':'Confirmation deadline',inp('dataLimite',is?'Ex: 13 de Maio às 12h00':'e.g. 13 May at 12:00',f.dataLimite));
    }
  } else if(curType==='confirmacao'){
    html+=nameFld; html+=dataFld;
    html+=fld(is?'Espaço':'Venue',sel('espaco',[
      {v:'Hotel de Convenções de Talatona',l:'Hotel de Convenções de Talatona'},
      {v:'Centro de Convenções de Talatona (CCTA)',l:'Centro de Convenções de Talatona (CCTA)'}
    ],f.espaco||'Hotel de Convenções de Talatona'));
    html+=fld(is?'Dados fiscais':'Fiscal details',sel('dadosFiscaisOpcao',[
      {v:'conhecidos',l:is?'Dados conhecidos — reconfirmar':'Known — reconfirm details'},
      {v:'falta',l:is?'Dados em falta — solicitar ao cliente':'Missing — request from client'}
    ],f.dadosFiscaisOpcao||'conhecidos'));
    if((f.dadosFiscaisOpcao||'conhecidos')==='conhecidos'){
      html+=fld('Entidade'+req(),inp('entidade',is?'Ex: Sonangol E.P.':'e.g. Sonangol E.P.',f.entidade));
      html+=fld('NIF'+req(),inp('nif','Ex: 5000012345',f.nif));
      html+=fld((is?'Morada Fiscal':'Fiscal Address')+req(),inp('morada',is?'Ex: Av. 4 de Fevereiro, Luanda':'e.g. Av. 4 de Fevereiro, Luanda',f.morada));
    }
  } else if(curType==='cobranca'){
    html+=nameFld; html+=dataFld;
    html+=fld(is?'Tipo de contacto':'Contact type',sel('cobrancaModo',[
      {v:'1',l:is?'1º contacto — envio de factura':'1st contact — invoice submission'},
      {v:'2',l:is?'2º contacto — 1º follow-up':'2nd contact — 1st follow-up'},
      {v:'3',l:is?'3º contacto — 2º follow-up (urgente)':'3rd contact — 2nd follow-up (urgent)'}
    ],f.cobrancaModo||'1'));
    html+=fld(is?'Nº da fatura (opcional)':'Invoice number (optional)',inp('fatura',is?'Ex: FT 2025/0034':'e.g. FT 2025/0034',f.fatura));
    html+=fld(is?'Valor (opcional)':'Amount (optional)',inp('valor',is?'Ex: 1.400.000,00 Kzs':'e.g. 1,400,000.00 Kzs',f.valor));
    html+=fld(is?'Data de vencimento (opcional)':'Due date (optional)',inp('vencimento',is?'Ex: 30 de Abril de 2026':'e.g. 30 April 2026',f.vencimento));
  } else if(curType==='satisfacao'){
    html+=nameFld;
  }

  $('form-fields').innerHTML=html;
  var ss=$('subtypeSel');
  if(ss){ ss.onchange=function(){ curSubtype=this.value; renderFields(); }; }
  validateForm();
}

function renderParagraphs(text,result,forOutlook){
  var html='', fs=forOutlook?'14px':'13px';
  text.split('\n\n').forEach(function(pp){
    if(pp==='[TABELA]'&&result.table){ html+='<div style="margin:16px 0;">'+result.table+'</div>'; }
    else if(pp==='[IMAGEM]'&&result.imgHtml){ html+='<div style="margin:16px 0;">'+result.imgHtml+'</div>'; }
    else if(pp.indexOf('[NOTAS]')===0){
      var lines=pp.replace('[NOTAS]','').split('\n').filter(function(l){ return l.length>0; });
      html+='<p style="margin:0 0 4px;font-size:'+fs+';line-height:1.8;color:#231F20;"><strong>Notas:</strong></p>';
      lines.forEach(function(ln){ html+='<p style="margin:0;font-size:11px;line-height:1.6;color:#231F20;">'+ln+'</p>'; });
      html+='<p style="margin:0 0 14px;"></p>';
    } else {
      html+='<p style="margin:0 0 14px;font-size:'+fs+';line-height:1.8;color:#231F20;">'+pp.replace(/\n/g,'<br>')+'</p>';
    }
  });
  return html;
}

function generateEmail(){
  var result=buildEmail(); if(!result||!result.text) return;
  emailResult=result;
  hide('formview'); show('resultview');
  setText('result-label',T('ready'));
  setText('result-title',T('email-generated'));
  setText('copy-btn',T('copy'));
  setText('edit-btn',T('edit'));
  $('email-preview').innerHTML=renderParagraphs(result.text,result,false);
}

function copyEmail(){
  if(!emailResult) return;
  var html=renderParagraphs(emailResult.text,emailResult,true);
  var plain=emailResult.text.replace('[TABELA]','(tabela incluida)').replace('[IMAGEM]','(imagem incluida)').replace('[NOTAS]','Notas:\n');
  var btn=$('copy-btn');
  try {
    navigator.clipboard.write([new ClipboardItem({'text/html':new Blob(['<meta charset="utf-8">'+html],{type:'text/html'}),'text/plain':new Blob([plain],{type:'text/plain'})})]).then(function(){
      btn.textContent=T('copied'); setTimeout(function(){ btn.textContent=T('copy'); },2500);
    });
  } catch(e){
    navigator.clipboard.writeText(plain).then(function(){
      btn.textContent=T('copied'); setTimeout(function(){ btn.textContent=T('copy'); },2500);
    });
  }
}

function extractData(){
  var btn=$('extract-btn'); if(!btn||!clientTxt.trim()) return;
  var is=p(); btn.textContent=is?'A extrair...':'Extracting...'; btn.disabled=true;
  fetch('https://api.anthropic.com/v1/messages',{
    method:'POST',headers:{'Content-Type':'application/json'},
    body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:1000,
      messages:[{role:'user',content:'Extrai do seguinte email os campos. Responde APENAS em JSON puro sem backticks. Se nao mencionado usa null.\nCampos: nome,entidade,nif,morada,nomeEvento,dataEvento,horario,participantes,contacto,telEmail,montagem,desmontagem,fornecedores,disposicao,av,cb,almoco,jantar,cocktail,outros\nEmail:\n'+clientTxt}]})
  }).then(function(r){ return r.json(); }).then(function(d){
    var txt=d.content?d.content.map(function(i){ return i.text||''; }).join(''):'';
    var parsed=JSON.parse(txt.replace(/```json|```/g,'').trim());
    Object.keys(parsed).forEach(function(k){ if(parsed[k]) fields[k]=parsed[k]; });
    var keys=[['nome','Nome'],['entidade','Entidade'],['nif','NIF'],['nomeEvento','Evento'],['dataEvento','Data'],['horario','Horário'],['participantes','Participantes']];
    var found=keys.filter(function(kv){ return fields[kv[0]]; }).map(function(kv){ return '<div style="margin-bottom:3px;"><strong>'+kv[1]+':</strong> '+fields[kv[0]]+'</div>'; }).join('');
    var er=$('extract-result');
    if(er) er.innerHTML=found?'<div style="background:#F0EAE3;border:1px solid #DDD4C8;border-radius:3px;padding:10px 14px;margin-bottom:16px;font-size:12px;">'+found+'<div style="margin-top:8px;color:#9A918C;font-size:10px;">'+(is?'Verifica os dados antes de gerar.':'Review before generating.')+'</div></div>':'';
    btn.textContent=is?'Extrair dados automaticamente':'Extract data automatically'; btn.disabled=false;
  }).catch(function(e){
    var er=$('extract-result');
    if(er) er.innerHTML='<div style="background:#fdecea;border:1px solid #e74c3c;border-radius:3px;padding:10px 14px;margin-bottom:16px;font-size:12px;color:#c0392b;">Erro ao extrair: '+e.message+'</div>';
    btn.textContent=is?'Extrair dados automaticamente':'Extract data automatically'; btn.disabled=false;
  });
}
