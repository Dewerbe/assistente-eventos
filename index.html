function parseNum(s){
  if(!s&&s!==0) return 0;
  var str=s.toString().trim().replace(/\s/g,'');
  var lc=str.lastIndexOf(','), ld=str.lastIndexOf('.');
  if(lc>ld) str=str.replace(/\./g,'').replace(',','.');
  else if(ld>lc) str=str.replace(/,/g,'');
  var n=parseFloat(str); return isNaN(n)?0:n;
}

function renderTable(tbodyId,rows,ivaPct,showRet,showCat){

      +'<td style="background:#F5FFF5;"><input class="ninput" type="text" value="'+(row.valor?fmt(row.valor):'')+'" placeholder="0,00" onchange="rowUpdate(\''+tbodyId+'\','+i+',\'valor\',this.value)"></td>'
      +'<td class="calc">'+(row.valor>0?fmt(base):'0,00')+'</td>'
      +'<td class="calc" style="color:'+(ivaPct===14?'#C0392B':'#1a6b3a')+';font-weight:500;">'+(row.valor>0?fmt(iva):'0,00')+'</td>'
      +'<td class="calc" style="color:'+(showRet&&row.valor>0?BLACK:'#C4AE96')+'">'+(showRet&&row.valor>0?fmt(ret):'—')+'</td>';
    tbody.appendChild(tr);
  });
}
function rowUpdate(tbodyId,idx,key,val){ var rows=(tbodyId==='tbody-hot')?hotRows:foraRows; if(key==='valor') rows[idx].valor=parseNum(val); else rows[idx][key]=val; renderCalc(); }
function updateTotals(showRet,showCat){
  var foraPF=0,foraIVA=0,foraRet=0;
  foraRows.forEach(function(r){ if(r.valor>0){ var b=r.valor/1.14; foraPF+=r.valor;foraIVA+=b*0.14;foraRet+=b*0.065; } });
  var hotPF=0,hotIVA=0;
  hotRows.forEach(function(r){ if(r.valor>0){ var b=r.valor/1.07; hotPF+=r.valor;hotIVA+=b*0.07; } });
  setText('tf-fora-pf',fmt(foraPF)); setText('tf-fora-iva',fmt(foraIVA)); setText('tf-fora-ret',showRet?fmt(foraRet):'—');
  setText('tf-hot-pf',fmt(hotPF)); setText('tf-hot-iva',fmt(hotIVA));
  var totalPF=foraPF+hotPF, deductCat=showCat?foraIVA:0, deductRet=showRet?foraRet:0;
  setText('grand-pf',fmt(totalPF)+' Kzs');
  var bd='';
  if(!showCat&&!showRet) bd='<div style="color:#9A918C;font-size:10px;">'+T('deduct-none')+'</div>';
  else { if(showCat) bd+='<div style="display:flex;justify-content:space-between;"><span>'+T('deduct-cat14')+'</span><span style="color:#e74c3c;">— '+fmt(deductCat)+' Kzs</span></div>'; if(showRet) bd+='<div style="display:flex;justify-content:space-between;"><span>'+T('deduct-ret')+'</span><span style="color:#e74c3c;">— '+fmt(deductRet)+' Kzs</span></div>'; }
  $('grand-breakdown').innerHTML=bd;
  setText('grand-receber',fmt(totalPF-deductCat-deductRet)+' Kzs');
}

// ─── DIAGNÓSTICO ──────────────────────────────────────────────
function diagCalc(){
  var foraVal=parseNum($('diag-fora')?$('diag-fora').value:'');
  var hotVal =parseNum($('diag-hot') ?$('diag-hot').value :'');
  var paidVal=parseNum($('diag-paid')?$('diag-paid').value:'');
  var area=$('diag-result-area');
  if(!area) return;

  var pfVal=foraVal+hotVal;
  var pfDisp=$('diag-pf-display');
  if(pfDisp){
    if(pfVal>0){ pfDisp.style.display='block'; pfDisp.textContent=(p()?'Total da proforma calculado: ':'Calculated invoice total: ')+fmt(pfVal)+' Kzs'; }
    else pfDisp.style.display='none';
  }
  if(!pfVal||!paidVal){ area.innerHTML=''; return; }

  var TOL=Math.max(2,pfVal*0.0001);
  var diff=pfVal-paidVal;
  var isPub=diagEntityType==='pub';

  // Correct values
  var foraBase=foraVal>0?foraVal/1.14:0;
  var foraIVA=foraBase*0.14, foraRet=foraBase*0.065;
  var hotBase=hotVal>0?hotVal/1.07:0;
  var hotIVA=hotBase*0.07;

  // Wrong-calculation variants for error detection
  var foraIVA_w=foraVal*0.14;   // IVA on full value (wrong)
  var foraRet_w=foraVal*0.065;  // ret on full value (wrong)
  var hotIVA_w =hotVal*0.07;    // IVA 7% on full hotel value (wrong)
  var hotRet_b =hotBase*0.065;  // ret on hotel base (wrong service)
  var hotRet_w =hotVal*0.065;   // ret on hotel full (doubly wrong)

  var msgs=[];

  // ── Correct scenarios ─────────────────────────────────────────
  if(Math.abs(diff)<TOL){
    if(foraVal===0) msgs.push({t:'ok',txt:p()?'✅ Correcto. Proforma 100% hotelaria — sem deduções aplicáveis. Pagamento integral correcto.':'✅ Correct. Invoice 100% hotel services — no deductions apply. Full payment is correct.'});
    else msgs.push({t:'warn',txt:p()?'⚠️ O cliente pagou o valor integral sem aplicar qualquer dedução. A retenção na fonte é <strong>obrigação do pagador</strong> — se não a fizer, não representa problema para nós desde que o pagamento seja integral.':'⚠️ The client paid the full amount without deductions. Withholding is the <strong>payer\'s obligation</strong> — if they choose not to apply it, it is not a problem provided full payment is made.'});
  } else if(isPub&&Math.abs(diff-foraIVA)<TOL){
    msgs.push({t:'ok',txt:p()?'✅ Correcto. <strong>Só cativação de IVA (14%)</strong> sobre serviços fora da hotelaria, calculada correctamente sobre a base de incidência (÷1,14).':'✅ Correct. <strong>VAT withholding only (14%)</strong> on non-hotel services, correctly calculated on the tax base (÷1.14).'});
  } else if(Math.abs(diff-foraRet)<TOL){
    msgs.push({t:'ok',txt:p()?'✅ Correcto. <strong>Só retenção de Imposto Industrial (6,5%)</strong> sobre a base de incidência dos serviços fora da hotelaria.':'✅ Correct. <strong>Industrial tax retention only (6.5%)</strong> on the tax base of non-hotel services.'});
  } else if(isPub&&Math.abs(diff-(foraIVA+foraRet))<TOL){
    msgs.push({t:'ok',txt:p()?'✅ Correcto. <strong>Cativação de IVA (14%) e retenção industrial (6,5%)</strong> sobre serviços fora da hotelaria, ambas calculadas correctamente sobre a base de incidência.':'✅ Correct. <strong>VAT withholding (14%) and industrial tax retention (6.5%)</strong> on non-hotel services, both correctly calculated on the tax base.'});
  } else {
    // ── Error detection ───────────────────────────────────────────
    var errs=[];

    // E1: Private entity applied VAT withholding
    if(!isPub&&(Math.abs(diff-foraIVA)<TOL||Math.abs(diff-foraIVA_w)<TOL||Math.abs(diff-(foraIVA+foraRet))<TOL)){
      errs.push(p()?'❌ <strong>Entidade privada não pode fazer cativação de IVA.</strong> A cativação é exclusiva de agentes cativadores, ao abrigo da Lei 7/19 e Lei 17/19.':'❌ <strong>Private entities cannot withhold VAT.</strong> VAT withholding is exclusive to withholding agents under Law 7/19 and Law 17/19.');
    }

    // E2: IVA calculated as value × rate instead of value ÷ (1+rate) × rate
    if(Math.abs(diff-foraIVA_w)<TOL){
      errs.push(p()?'❌ <strong>Cativação de IVA calculada sobre o valor total com IVA</strong> (Valor × 14%) em vez da base de incidência (Valor ÷ 1,14 × 14%). Correcto: Base = '+fmt(foraVal)+' ÷ 1,14 = '+fmt(foraBase)+' Kzs → IVA correcto = '+fmt(foraIVA)+' Kzs. Valor aplicado: '+fmt(foraIVA_w)+' Kzs.':'❌ <strong>VAT withholding calculated on total value including VAT</strong> (Value × 14%) instead of tax base (Value ÷ 1.14 × 14%). Correct: Base = '+fmt(foraVal)+' ÷ 1.14 = '+fmt(foraBase)+' Kzs → Correct VAT = '+fmt(foraIVA)+' Kzs. Applied: '+fmt(foraIVA_w)+' Kzs.');
    } else if(hotVal>0&&(Math.abs(diff-hotIVA_w)<TOL||Math.abs(diff-hotIVA)<TOL)){
      errs.push(p()?'❌ <strong>Cativação de IVA aplicada sobre serviços de hotelaria.</strong> O IVA de 7% dos serviços de hotelaria deve ser pago na totalidade — não está sujeito a cativação. '+(Math.abs(diff-hotIVA_w)<TOL?'Adicionalmente, o cálculo foi feito sobre o valor total (×7%) em vez da base de incidência (÷1,07×7%).':''):'❌ <strong>VAT withholding applied to hotel services.</strong> The 7% VAT on hotel services must be paid in full — it is not subject to withholding. '+(Math.abs(diff-hotIVA_w)<TOL?'Additionally, the calculation was done on the full value (×7%) instead of the tax base (÷1.07×7%).':''));
    } else if(hotVal>0&&foraVal>0&&(Math.abs(diff-(foraIVA_w+hotIVA_w))<TOL||Math.abs(diff-(foraIVA+hotIVA_w))<TOL||Math.abs(diff-(foraIVA_w+hotIVA))<TOL||Math.abs(diff-(foraIVA+hotIVA))<TOL)){
      errs.push(p()?'❌ <strong>Cativação de IVA aplicada sobre toda a proforma</strong> (hotelaria + fora hotelaria). A cativação de IVA aplica-se apenas aos serviços fora da hotelaria (IVA 14%). O IVA 7% da hotelaria não está sujeito a cativação.':'❌ <strong>VAT withholding applied to the entire invoice</strong> (hotel + non-hotel). VAT withholding applies only to non-hotel services (VAT 14%). The 7% VAT on hotel services is not subject to withholding.');
    }

    // E3: Retention on hotel services
    if(errs.length===0&&hotVal>0&&(Math.abs(diff-hotRet_b)<TOL||Math.abs(diff-hotRet_w)<TOL||Math.abs(diff-(foraRet+hotRet_b))<TOL||Math.abs(diff-(foraRet+hotRet_w))<TOL||Math.abs(diff-((foraBase+hotBase)*0.065))<TOL||Math.abs(diff-(pfVal*0.065))<TOL)){
      errs.push(p()?'❌ <strong>Retenção de Imposto Industrial aplicada sobre serviços de hotelaria.</strong> Os serviços de hotelaria não estão sujeitos a retenção na fonte, ao abrigo da Lei 19/14 e Lei 26/20 (art.º 67.º).':'❌ <strong>Industrial tax retention applied to hotel services.</strong> Hotel services are not subject to withholding tax under Law 19/14 and Law 26/20 (art. 67).');
    }

    // E4: Retention on full value (with VAT) instead of base
    if(errs.length===0&&foraVal>0&&Math.abs(foraRet-foraRet_w)>TOL&&(Math.abs(diff-foraRet_w)<TOL||Math.abs(diff-(foraIVA+foraRet_w))<TOL)){
      errs.push(p()?'❌ <strong>Retenção de 6,5% calculada sobre o valor total com IVA</strong> em vez da base de incidência. Correcto: Base = '+fmt(foraVal)+' ÷ 1,14 = '+fmt(foraBase)+' Kzs → Retenção = '+fmt(foraRet)+' Kzs. Aplicado: '+fmt(foraRet_w)+' Kzs.':'❌ <strong>6.5% retention calculated on the total value including VAT</strong> instead of the tax base. Correct: Base = '+fmt(foraVal)+' ÷ 1.14 = '+fmt(foraBase)+' Kzs → Retention = '+fmt(foraRet)+' Kzs. Applied: '+fmt(foraRet_w)+' Kzs.');
    }

    // Fallback
    if(errs.length===0){
      var pct=(diff/pfVal*100).toFixed(2);
      errs.push(p()?'⚠️ O valor deduzido (<strong>'+fmt(diff)+' Kzs</strong>, '+pct+'% da proforma) não corresponde a nenhum cenário padrão. Recomenda-se verificar os detalhes com o cliente.':'⚠️ The deducted amount (<strong>'+fmt(diff)+' Kzs</strong>, '+pct+'% of invoice) does not match any standard scenario. Please verify the details with the client.');
    }
    errs.forEach(function(e){ msgs.push({t:e.indexOf('⚠️')===0?'warn':'err',txt:e}); });
  }

  // ── Scenarios ─────────────────────────────────────────────────
  var scenarios=[];
  if(foraVal>0){
    if(isPub){
      scenarios.push({lbl:p()?'Opção A — Só cativação IVA 14%':'Option A — VAT withholding only (14%)', val:pfVal-foraIVA, detail:(p()?'Cativação: ':'Withholding: ')+fmt(foraIVA)+' Kzs'});
      scenarios.push({lbl:p()?'Opção B — Só retenção industrial 6,5%':'Option B — Industrial retention only (6.5%)', val:pfVal-foraRet, detail:(p()?'Retenção: ':'Retention: ')+fmt(foraRet)+' Kzs'});
      scenarios.push({lbl:p()?'Opção C — Cativação + retenção (ambas)':'Option C — Withholding + retention (both)', val:pfVal-foraIVA-foraRet, detail:(p()?'Cativação: ':'Withholding: ')+fmt(foraIVA)+' Kzs + '+(p()?'Retenção: ':'Retention: ')+fmt(foraRet)+' Kzs'});
    } else {
      scenarios.push({lbl:p()?'Retenção industrial 6,5%':'Industrial retention 6.5%', val:pfVal-foraRet, detail:(p()?'Retenção: ':'Retention: ')+fmt(foraRet)+' Kzs'});
    }
  }

  // ── Render ─────────────────────────────────────────────────────
  var html='';
  msgs.forEach(function(m){ html+='<div class="diag-result diag-'+m.t+'">'+m.txt+'</div>'; });
  html+='<div style="margin-top:16px;background:#fff;border:1px solid #DDD4C8;border-radius:3px;padding:14px 18px;font-size:11px;line-height:2;">';
  html+='<div style="font-size:10px;color:#887157;font-weight:700;letter-spacing:0.1em;text-transform:uppercase;margin-bottom:8px;">'+(p()?'Análise do Valor Deduzido':'Deduction Analysis')+'</div>';
  html+='<div style="display:flex;justify-content:space-between;"><span>'+(p()?'Total da proforma:':'Invoice total:')+'</span><span><strong>'+fmt(pfVal)+' Kzs</strong></span></div>';
  if(foraVal>0) html+='<div style="display:flex;justify-content:space-between;color:#9A918C;font-size:10px;"><span>'+(p()?'↳ Fora hotelaria:':'↳ Non-hotel:')+'</span><span>'+fmt(foraVal)+' Kzs</span></div>';
  if(hotVal>0)  html+='<div style="display:flex;justify-content:space-between;color:#9A918C;font-size:10px;"><span>'+(p()?'↳ Hotelaria:':'↳ Hotel:')+'</span><span>'+fmt(hotVal)+' Kzs</span></div>';
  html+='<div style="display:flex;justify-content:space-between;"><span>'+(p()?'Valor recebido:':'Amount received:')+'</span><span><strong>'+fmt(paidVal)+' Kzs</strong></span></div>';
  html+='<div style="display:flex;justify-content:space-between;color:#e74c3c;"><span>'+(p()?'Valor deduzido pelo cliente:':'Amount deducted by client:')+'</span><span><strong>— '+fmt(diff)+' Kzs</strong></span></div>';
  html+='<div style="border-top:1px solid #DDD4C8;margin:10px 0;"></div>';
  if(scenarios.length>0){
    html+='<div style="font-size:10px;color:#887157;font-weight:700;letter-spacing:0.08em;text-transform:uppercase;margin-bottom:8px;">'+(p()?'Cenários correctos possíveis':'Correct possible scenarios')+'</div>';
    scenarios.forEach(function(s){
      html+='<div style="background:#F5F1EC;border-radius:3px;padding:8px 10px;margin-bottom:6px;">'
        +'<div style="display:flex;justify-content:space-between;align-items:center;"><span style="font-size:11px;font-weight:600;color:#231F20;">'+s.lbl+'</span><span style="font-size:13px;font-weight:700;color:#1a6b3a;">'+fmt(s.val)+' Kzs</span></div>'
        +'<div style="font-size:10px;color:#9A918C;margin-top:2px;">↳ '+s.detail+'</div></div>';
    });
  } else {
    html+='<div style="font-size:10px;color:#9A918C;">'+(p()?'Sem deduções aplicáveis — proforma 100% serviços de hotelaria.':'No deductions applicable — invoice 100% hotel services.')+'</div>';
  }
  html+='</div>';
  area.innerHTML=html;
}

  +'<div><div style="font-size:11px;color:#887157;letter-spacing:0.12em;text-transform:uppercase;font-weight:700;margin-bottom:10px;">'+(is?'Erros Mais Comuns':'Most Common Errors')+'</div>'
