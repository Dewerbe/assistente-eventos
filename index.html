function parseNum(s){
  if(!s&&s!==0) return 0;
  var str=s.toString().trim().replace(/\s/g,'');
  var lc=str.lastIndexOf(','),ld=str.lastIndexOf('.');
  if(lc>ld) str=str.replace(/\./g,'').replace(',','.');
  else if(ld>lc) str=str.replace(/,/g,'');
  var n=parseFloat(str); return isNaN(n)?0:n;
}

function setEntity(type){ entityType=type; $('ent-pub').classList.toggle('active',type==='pub'); $('ent-priv').classList.toggle('active',type==='priv'); updateEntityNote();renderCheckboxes();renderCalc(); }

function renderCheckboxes(){

  box.innerHTML=
    '<div class="chk-row" onclick="toggleChk(\'cat\')"><input type="checkbox" id="chk-cat" '+(doCativacao?'checked':'')+' onclick="event.stopPropagation();toggleChk(\'cat\')"><span>'+T('chk-cat')+'</span><small>'+T('chk-cat-sub')+'</small></div>'
   +'<div class="chk-row" onclick="toggleChk(\'catHot\')"><input type="checkbox" id="chk-catHot" '+(doCativacaoHot?'checked':'')+' onclick="event.stopPropagation();toggleChk(\'catHot\')"><span>'+T('chk-catHot')+'</span><small>'+T('chk-catHot-sub')+'</small></div>'
   +'<div class="chk-row" onclick="toggleChk(\'ret\')"><input type="checkbox" id="chk-ret" '+(doRetencao?'checked':'')+' onclick="event.stopPropagation();toggleChk(\'ret\')"><span>'+T('chk-ret')+'</span><small>'+T('chk-ret-sub')+'</small></div>';

function toggleChk(w){
  if(w==='cat') doCativacao=!doCativacao;
  else if(w==='catHot') doCativacaoHot=!doCativacaoHot;
  else doRetencao=!doRetencao;
  var el=$(w==='cat'?'chk-cat':w==='catHot'?'chk-catHot':'chk-ret');
  if(el) el.checked=(w==='cat'?doCativacao:w==='catHot'?doCativacaoHot:doRetencao);
  renderCalc();
}

function renderCalc(){
  var showRet=entityType==='priv'?true:doRetencao;
  var showCatFora=entityType==='pub'&&doCativacao;
  var showCatHot=entityType==='pub'&&doCativacaoHot;
  renderTable('tbody-fora',foraRows,14,showRet,showCatFora);
  renderTable('tbody-hot',hotRows,7,false,showCatHot);
  updateTotals(showRet,showCatFora,showCatHot);
}
function renderTable(tbodyId,rows,ivaPct,showRet,showCat){
  var tbody=$(tbodyId); if(!tbody) return;
  var ph=T('ph-conceito'); tbody.innerHTML='';
  rows.forEach(function(row,i){
    var base=row.valor>0?(row.valor/(1+ivaPct/100)):0;
    var iva=base*(ivaPct/100),ret=showRet?base*0.065:0;
    var tr=document.createElement('tr');
    tr.innerHTML='<td style="background:#F5FFF5;"><input class="cinput" type="text" value="'+escHtml(row.conceito)+'" placeholder="'+ph+'" onchange="rowUpdate(\''+tbodyId+'\','+i+',\'conceito\',this.value)"></td>'
      +'<td style="background:#F5FFF5;"><input class="ninput" type="text" value="'+(row.valor?fmt(row.valor):'')+'" placeholder="0,00" onchange="rowUpdate(\''+tbodyId+'\','+i+',\'valor\',this.value)"></td>'
      +'<td class="calc">'+(row.valor>0?fmt(base):'0,00')+'</td>'
      +'<td class="calc" style="color:'+(ivaPct===14?'#C0392B':'#1a6b3a')+';font-weight:500;">'+(row.valor>0?fmt(iva):'0,00')+'</td>'
      +'<td class="calc" style="color:'+(showRet&&row.valor>0?BLACK:'#C4AE96')+'">'+(showRet&&row.valor>0?fmt(ret):'n/a')+'</td>';
    tbody.appendChild(tr);
  });
}
function rowUpdate(tbodyId,idx,key,val){ var rows=(tbodyId==='tbody-hot')?hotRows:foraRows; if(key==='valor') rows[idx].valor=parseNum(val); else rows[idx][key]=val; renderCalc(); }
function updateTotals(showRet,showCatFora,showCatHot){
  var foraPF=0,foraIVA=0,foraRet=0;
  foraRows.forEach(function(r){ if(r.valor>0){ var b=r.valor/1.14; foraPF+=r.valor;foraIVA+=b*0.14;foraRet+=b*0.065; } });
  var hotPF=0,hotIVA=0;
  hotRows.forEach(function(r){ if(r.valor>0){ var b=r.valor/1.07; hotPF+=r.valor;hotIVA+=b*0.07; } });
  setText('tf-fora-pf',fmt(foraPF));setText('tf-fora-iva',fmt(foraIVA));setText('tf-fora-ret',showRet?fmt(foraRet):'n/a');
  setText('tf-hot-pf',fmt(hotPF));setText('tf-hot-iva',fmt(hotIVA));
  var totalPF=foraPF+hotPF,dCatFora=showCatFora?foraIVA:0,dCatHot=showCatHot?hotIVA:0,dRet=showRet?foraRet:0;
  setText('grand-pf',fmt(totalPF)+' Kzs');
  var bd='';
  if(!showCatFora&&!showCatHot&&!showRet) bd='<div style="color:#9A918C;font-size:10px;">'+T('deduct-none')+'</div>';
  else {
    if(showCatFora) bd+='<div style="display:flex;justify-content:space-between;"><span>'+T('deduct-cat14')+'</span><span style="color:#e74c3c;">- '+fmt(dCatFora)+' Kzs</span></div>';
    if(showCatHot)  bd+='<div style="display:flex;justify-content:space-between;"><span>'+T('deduct-cat7')+'</span><span style="color:#e74c3c;">- '+fmt(dCatHot)+' Kzs</span></div>';
    if(showRet)     bd+='<div style="display:flex;justify-content:space-between;"><span>'+T('deduct-ret')+'</span><span style="color:#e74c3c;">- '+fmt(dRet)+' Kzs</span></div>';
  }
  $('grand-breakdown').innerHTML=bd;
  setText('grand-receber',fmt(totalPF-dCatFora-dCatHot-dRet)+' Kzs');
}
function resetCalc(){ initRows();doCativacao=true;doCativacaoHot=false;doRetencao=true;renderCheckboxes();renderCalc(); }

// ─── DIAGNÓSTICO ──────────────────────────────────────────────
function diagCalc(){
  var foraVal=parseNum($('diag-fora')?$('diag-fora').value:'');
  var hotVal=parseNum($('diag-hot')?$('diag-hot').value:'');
  var paidVal=parseNum($('diag-paid')?$('diag-paid').value:'');
  var area=$('diag-result-area'); if(!area) return;
  var pfVal=foraVal+hotVal;
  var pfDisp=$('diag-pf-display');
  if(pfDisp){ if(pfVal>0){ pfDisp.style.display='block'; pfDisp.textContent=(p()?'Total da proforma calculado: ':'Calculated invoice total: ')+fmt(pfVal)+' Kzs'; } else pfDisp.style.display='none'; }
  if(!pfVal||!paidVal){ area.innerHTML=''; return; }

  var TOL=Math.max(2,pfVal*0.0001),diff=pfVal-paidVal,isPub=diagEntityType==='pub';
  var foraBase=foraVal>0?foraVal/1.14:0,foraIVA=foraBase*0.14,foraRet=foraBase*0.065;
  var hotBase=hotVal>0?hotVal/1.07:0,hotIVA=hotBase*0.07;
  var foraIVA_w=foraVal*0.14,foraRet_w=foraVal*0.065,hotIVA_w=hotVal*0.07;
  var hotRet_b=hotBase*0.065,hotRet_w=hotVal*0.065;

  var msgs=[];

  if(Math.abs(diff)<TOL){
    if(foraVal===0) msgs.push({t:'ok',txt:p()?'✅ Correcto. Proforma 100% hotelaria — sem deduções aplicáveis. Pagamento integral correcto.':'✅ Correct. Invoice 100% hotel services — no deductions apply. Full payment is correct.'});
    else msgs.push({t:'warn',txt:p()?'⚠️ O cliente pagou o valor integral sem aplicar qualquer dedução. A retenção na fonte é <strong>obrigação do pagador</strong> — se não a fizer, não representa problema para nós desde que o pagamento seja integral.':'⚠️ The client paid the full amount without deductions. Withholding is the <strong>payer\'s obligation</strong> — if they choose not to apply it, it is not a problem provided full payment is made.'});
  } else if(isPub&&Math.abs(diff-foraIVA)<TOL){
    msgs.push({t:'ok',txt:p()?'✅ Correcto. <strong>Só cativação de IVA 14%</strong> sobre serviços fora da hotelaria, calculada correctamente sobre a base de incidência (÷1,14).':'✅ Correct. <strong>VAT withholding 14% only</strong> on non-hotel services, correctly calculated on the tax base (÷1.14).'});
  } else if(Math.abs(diff-foraRet)<TOL){
    msgs.push({t:'ok',txt:p()?'✅ Correcto. <strong>Só retenção de Imposto Industrial (6,5%)</strong> sobre a base de incidência dos serviços fora da hotelaria.':'✅ Correct. <strong>Industrial tax retention only (6.5%)</strong> on the tax base of non-hotel services.'});
  } else if(isPub&&Math.abs(diff-(foraIVA+foraRet))<TOL){
    msgs.push({t:'ok',txt:p()?'✅ Correcto. <strong>Cativação de IVA 14% e retenção industrial 6,5%</strong> sobre serviços fora da hotelaria, ambas calculadas correctamente sobre a base de incidência.':'✅ Correct. <strong>VAT withholding 14% and industrial tax retention 6.5%</strong> on non-hotel services, both correctly calculated on the tax base.'});
  } else {
    var errs=[],matched=false;
    if(!isPub){
      var looksLikeCat=Math.abs(diff-foraIVA)<TOL||Math.abs(diff-foraIVA_w)<TOL||Math.abs(diff-hotIVA)<TOL||Math.abs(diff-hotIVA_w)<TOL||Math.abs(diff-foraVal*0.07)<TOL||Math.abs(diff-(foraVal/1.07)*0.07)<TOL||Math.abs(diff-(foraVal/1.14)*0.07)<TOL||Math.abs(diff-(foraIVA+foraRet))<TOL;
      if(looksLikeCat){ errs.push(p()?'❌ <strong>Parece ter sido efectuada cativação de IVA, o que não é permitido a entidades privadas.</strong> A cativação é exclusiva de agentes cativadores (Estado e organismos públicos), ao abrigo da Lei 7/19 e Lei 17/19. Uma entidade privada só pode efectuar retenção de Imposto Industrial (6,5%) sobre serviços fora do âmbito da hotelaria, calculada sobre a base de incidência.':'❌ <strong>It appears VAT withholding was applied, which is not permitted for private entities.</strong> VAT withholding is exclusive to withholding agents (State and public bodies) under Law 7/19 and Law 17/19. A private entity may only apply industrial tax retention (6.5%) on non-hotel services, calculated on the tax base.'); matched=true; }
    }
    var foraIVA_taxa7_full=foraVal*0.07,foraIVA_taxa7_b107=(foraVal/1.07)*0.07,foraIVA_taxa7_b114=(foraVal/1.14)*0.07;
    if(!matched&&foraVal>0&&(Math.abs(diff-foraIVA_taxa7_full)<TOL||Math.abs(diff-foraIVA_taxa7_b107)<TOL||Math.abs(diff-foraIVA_taxa7_b114)<TOL)){
      errs.push(p()?'❌ <strong>Taxa de IVA errada aplicada à cativação.</strong> O cliente aplicou a taxa de 7% sobre serviços fora do âmbito da hotelaria, que têm IVA de 14%. '+(Math.abs(diff-foraIVA_taxa7_full)<TOL?'Adicionalmente, o cálculo foi feito sobre o valor total ('+fmt(foraVal)+' × 7% = '+fmt(foraIVA_taxa7_full)+' Kzs) em vez da base de incidência. ':'')+'A cativação correcta seria: '+fmt(foraVal)+' ÷ 1,14 = '+fmt(foraBase)+' Kzs → Cativação correcta = '+fmt(foraIVA)+' Kzs.':'❌ <strong>Wrong VAT rate applied to withholding.</strong> The client applied the 7% rate to non-hotel services, which carry 14% VAT. '+(Math.abs(diff-foraIVA_taxa7_full)<TOL?'Additionally, the calculation was done on the full value ('+fmt(foraVal)+' × 7% = '+fmt(foraIVA_taxa7_full)+' Kzs) instead of the tax base. ':'')+'Correct: '+fmt(foraVal)+' ÷ 1.14 = '+fmt(foraBase)+' Kzs → Correct withholding = '+fmt(foraIVA)+' Kzs.'); matched=true;
    }
    if(!matched&&hotVal>0&&Math.abs(diff-hotIVA_w)<TOL){ errs.push(p()?'❌ <strong>Cativação de IVA aplicada sobre serviços de hotelaria (7%)</strong>, calculada sobre o valor total ('+fmt(hotVal)+' × 7% = '+fmt(hotIVA_w)+' Kzs). Dois erros: (1) os serviços de hotelaria não estão sujeitos a cativação de IVA; (2) o cálculo correcto seria sobre a base de incidência (÷1,07): '+fmt(hotBase)+' Kzs → IVA = '+fmt(hotIVA)+' Kzs.':'❌ <strong>VAT withholding applied to hotel services (7%)</strong>, on the full value ('+fmt(hotVal)+' × 7% = '+fmt(hotIVA_w)+' Kzs). Two errors: (1) hotel services are not subject to VAT withholding; (2) correct calculation on tax base (÷1.07): '+fmt(hotBase)+' Kzs → VAT = '+fmt(hotIVA)+' Kzs.'); matched=true; }
    if(!matched&&hotVal>0&&Math.abs(diff-hotIVA)<TOL){ errs.push(p()?'❌ <strong>Cativação de IVA aplicada sobre serviços de hotelaria.</strong> O IVA de 7% dos serviços de hotelaria deve ser pago na totalidade — não está sujeito a cativação.':'❌ <strong>VAT withholding applied to hotel services.</strong> The 7% VAT on hotel services must be paid in full — it is not subject to withholding.'); matched=true; }
    if(!matched&&foraVal>0&&hotVal>0&&foraVal>0){
      // Cliente juntou tudo e aplicou 14% sobre o total (ou base total)
      var totalIVA14_full=pfVal*0.14;
      var totalBase114=pfVal/1.14;
      var totalIVA14_base=totalBase114*0.14;
      if(Math.abs(diff-totalIVA14_full)<TOL||Math.abs(diff-totalIVA14_base)<TOL){
        errs.push(p()
          ?'❌ <strong>Cativação de IVA 14% aplicada sobre a totalidade da proforma</strong> (serviços de hotelaria + serviços fora da hotelaria). Os serviços de hotelaria estão sujeitos a IVA de 7%, não de 14%, e o IVA correspondente deve ser pago na totalidade — não está sujeito a cativação. A cativação de IVA a 14% aplica-se exclusivamente aos serviços fora do âmbito da hotelaria. '+(Math.abs(diff-totalIVA14_full)<TOL?'Adicionalmente, o cálculo foi feito sobre o valor total com IVA ('+fmt(pfVal)+' × 14% = '+fmt(totalIVA14_full)+' Kzs) em vez da base de incidência.':'')+(Math.abs(diff-totalIVA14_base)<TOL?'O cálculo foi feito sobre a base de incidência do total ('+fmt(pfVal)+' ÷ 1,14 = '+fmt(totalBase114)+' Kzs), mas a taxa de 14% não é aplicável aos serviços de hotelaria.':'')+' A cativação correcta seria apenas sobre os serviços fora da hotelaria: '+fmt(foraVal)+' ÷ 1,14 = '+fmt(foraBase)+' Kzs → Cativação correcta = '+fmt(foraIVA)+' Kzs.'
          :'❌ <strong>VAT withholding at 14% applied to the entire invoice</strong> (hotel services + non-hotel services). Hotel services are subject to 7% VAT, not 14%, and the corresponding VAT must be paid in full — it is not subject to withholding. VAT withholding at 14% applies exclusively to non-hotel services. '+(Math.abs(diff-totalIVA14_full)<TOL?'Additionally, the calculation was made on the total value including VAT ('+fmt(pfVal)+' × 14% = '+fmt(totalIVA14_full)+' Kzs) instead of the tax base.':'')+' The correct withholding should be applied only to non-hotel services: '+fmt(foraVal)+' ÷ 1.14 = '+fmt(foraBase)+' Kzs → Correct withholding = '+fmt(foraIVA)+' Kzs.');
        matched=true;
      }
    }
    if(!matched&&hotVal>0&&foraVal>0&&(Math.abs(diff-(foraIVA+hotIVA))<TOL||Math.abs(diff-(foraIVA_w+hotIVA_w))<TOL||Math.abs(diff-(foraIVA+hotIVA_w))<TOL||Math.abs(diff-(foraIVA_w+hotIVA))<TOL)){ errs.push(p()?'❌ <strong>Cativação de IVA aplicada sobre toda a proforma</strong> (hotelaria + fora hotelaria). A cativação aplica-se apenas aos serviços fora da hotelaria (IVA 14%). O IVA 7% da hotelaria deve ser pago na totalidade.':'❌ <strong>VAT withholding applied to the entire invoice</strong> (hotel + non-hotel). Withholding applies only to non-hotel services (VAT 14%). The 7% VAT on hotel services must be paid in full.'); matched=true; }
    if(!matched&&hotVal>0&&(Math.abs(diff-hotRet_b)<TOL||Math.abs(diff-hotRet_w)<TOL||Math.abs(diff-(foraRet+hotRet_b))<TOL||Math.abs(diff-(foraRet+hotRet_w))<TOL||Math.abs(diff-((foraBase+hotBase)*0.065))<TOL||Math.abs(diff-(pfVal*0.065))<TOL)){ errs.push(p()?'❌ <strong>Retenção de Imposto Industrial aplicada sobre serviços de hotelaria.</strong> Os serviços de hotelaria não estão sujeitos a retenção na fonte, ao abrigo da Lei 19/14 e Lei 26/20 (art.º 67.º).':'❌ <strong>Industrial tax retention applied to hotel services.</strong> Hotel services are not subject to withholding tax under Law 19/14 and Law 26/20 (art. 67).'); matched=true; }
    if(!matched&&foraVal>0&&Math.abs(foraRet-foraRet_w)>TOL&&(Math.abs(diff-foraRet_w)<TOL||Math.abs(diff-(foraIVA+foraRet_w))<TOL)){ errs.push(p()?'❌ <strong>Retenção de 6,5% calculada sobre o valor total com IVA</strong> ('+fmt(foraVal)+' × 6,5% = '+fmt(foraRet_w)+' Kzs) em vez da base de incidência. Correcto: '+fmt(foraVal)+' ÷ 1,14 = '+fmt(foraBase)+' Kzs → Retenção = '+fmt(foraRet)+' Kzs.':'❌ <strong>6.5% retention calculated on the total value including VAT</strong> ('+fmt(foraVal)+' × 6.5% = '+fmt(foraRet_w)+' Kzs) instead of tax base. Correct: '+fmt(foraVal)+' ÷ 1.14 = '+fmt(foraBase)+' Kzs → Retention = '+fmt(foraRet)+' Kzs.'); matched=true; }
    if(!matched){ var pct=(diff/pfVal*100).toFixed(2); errs.push(p()?'⚠️ O valor deduzido (<strong>'+fmt(diff)+' Kzs</strong>, '+pct+'% da proforma) não corresponde a nenhum cenário padrão identificado. Recomenda-se verificar os detalhes com o cliente.':'⚠️ The deducted amount (<strong>'+fmt(diff)+' Kzs</strong>, '+pct+'% of invoice) does not match any standard scenario. Please verify the details with the client.'); }
    errs.forEach(function(e){ msgs.push({t:e.indexOf('⚠️')===0?'warn':'err',txt:e}); });
  }

  // Scenarios
  var hasFora=foraVal>0,hasHot=hotVal>0,scenarios=[];
  if(isPub){
    if(hasFora) scenarios.push({lbl:p()?'Opção A — Só cativação IVA 14% (fora hotelaria)':'Option A — VAT withholding 14% only (non-hotel)',val:pfVal-foraIVA,detail:(p()?'Cativação 14%: ':'Withholding 14%: ')+fmt(foraIVA)+' Kzs'});

function copyDiagEmail(){
  var d=window._diagEmailData; if(!d) return;
  var btn=$('copy-diag-btn'); if(!btn) return;
  var fullHtml='<meta charset="utf-8">'+d.html;
  var plain=d.body.replace('[TABELA]','\n(tabela incluída)\n');
  try{
    navigator.clipboard.write([new ClipboardItem({'text/html':new Blob([fullHtml],{type:'text/html'}),'text/plain':new Blob([plain],{type:'text/plain'})})]).then(function(){
      btn.textContent=p()?'Copiado ✓':'Copied ✓'; setTimeout(function(){ btn.textContent=p()?'Copiar':'Copy'; },2500);
    });
  } catch(e){
    navigator.clipboard.writeText(plain).then(function(){
      btn.textContent=p()?'Copiado ✓':'Copied ✓'; setTimeout(function(){ btn.textContent=p()?'Copiar':'Copy'; },2500);
    });
  }
}

function renderParagraphs(text,result,forOutlook){ var html='',fs=forOutlook?'14px':'13px'; text.split('\n\n').forEach(function(pp){ if(pp==='[TABELA]'&&result.table){ html+='<div style="margin:16px 0;">'+result.table+'</div>'; } else if(pp==='[IMAGEM]'&&result.imgHtml){ html+='<div style="margin:16px 0;">'+result.imgHtml+'</div>'; } else if(pp.indexOf('[NOTAS]')===0){ var lines=pp.replace('[NOTAS]','').split('\n').filter(function(l){ return l.length>0; }); html+='<p style="margin:0 0 4px;font-size:'+fs+';line-height:1.8;color:#231F20;"><strong>Notas:</strong></p>'; lines.forEach(function(ln){ html+='<p style="margin:0;font-size:11px;line-height:1.6;color:#231F20;">'+ln+'</p>'; }); html+='<p style="margin:0 0 14px;"></p>'; } else { html+='<p style="margin:0 0 14px;font-size:'+fs+';line-height:1.8;color:#231F20;">'+pp.replace(/\n/g,'<br>')+'</p>'; } }); return html; }
function generateEmail(){ var result=buildEmail(); if(!result||!result.text) return; emailResult=result; hide('formview');show('resultview'); setText('result-label',T('ready'));setText('result-title',T('email-generated'));setText('copy-btn',T('copy'));setText('edit-btn',T('edit')); $('email-preview').innerHTML=renderParagraphs(result.text,result,false); }
function copyEmail(){ if(!emailResult) return; var html=renderParagraphs(emailResult.text,emailResult,true),plain=emailResult.text.replace('[TABELA]','(tabela incluida)').replace('[IMAGEM]','(imagem incluida)').replace('[NOTAS]','Notas:\n'),btn=$('copy-btn'); try{ navigator.clipboard.write([new ClipboardItem({'text/html':new Blob(['<meta charset="utf-8">'+html],{type:'text/html'}),'text/plain':new Blob([plain],{type:'text/plain'})})]).then(function(){ btn.textContent=T('copied'); setTimeout(function(){ btn.textContent=T('copy'); },2500); }); }catch(e){ navigator.clipboard.writeText(plain).then(function(){ btn.textContent=T('copied'); setTimeout(function(){ btn.textContent=T('copy'); },2500); }); } }
function extractData(){ var btn=$('extract-btn'); if(!btn||!clientTxt.trim()) return; var is=p(); btn.textContent=is?'A extrair...':'Extracting...'; btn.disabled=true; fetch('https://api.anthropic.com/v1/messages',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:1000,messages:[{role:'user',content:'Extrai do seguinte email os campos. Responde APENAS em JSON puro sem backticks. Se nao mencionado usa null.\nCampos: nome,entidade,nif,morada,nomeEvento,dataEvento,horario,participantes,contacto,telEmail,montagem,desmontagem,fornecedores,disposicao,av,cb,almoco,jantar,cocktail,outros\nEmail:\n'+clientTxt}]})}).then(function(r){ return r.json(); }).then(function(d){ var txt=d.content?d.content.map(function(i){ return i.text||''; }).join(''):''; var parsed=JSON.parse(txt.replace(/```json|```/g,'').trim()); Object.keys(parsed).forEach(function(k){ if(parsed[k]) fields[k]=parsed[k]; }); var keys=[['nome','Nome'],['entidade','Entidade'],['nif','NIF'],['nomeEvento','Evento'],['dataEvento','Data'],['horario','Horário'],['participantes','Participantes']]; var found=keys.filter(function(kv){ return fields[kv[0]]; }).map(function(kv){ return '<div style="margin-bottom:3px;"><strong>'+kv[1]+':</strong> '+fields[kv[0]]+'</div>'; }).join(''); var er=$('extract-result'); if(er) er.innerHTML=found?'<div style="background:#F0EAE3;border:1px solid #DDD4C8;border-radius:3px;padding:10px 14px;margin-bottom:16px;font-size:12px;">'+found+'<div style="margin-top:8px;color:#9A918C;font-size:10px;">'+(is?'Verifica os dados antes de gerar.':'Review before generating.')+'</div></div>':''; btn.textContent=is?'Extrair dados automaticamente':'Extract data automatically'; btn.disabled=false; }).catch(function(e){ var er=$('extract-result'); if(er) er.innerHTML='<div style="background:#fdecea;border:1px solid #e74c3c;border-radius:3px;padding:10px 14px;margin-bottom:16px;font-size:12px;color:#c0392b;">Erro ao extrair: '+e.message+'</div>'; btn.textContent=is?'Extrair dados automaticamente':'Extract data automatically'; btn.disabled=false; }); }

refreshAll();
