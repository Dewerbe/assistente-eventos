function emptyRow(){ return {conceito:'',valor:0}; }
function initRows(){ foraRows=[]; hotRows=[]; for(var i=0;i<NUM_ROWS;i++){ foraRows.push(emptyRow()); hotRows.push(emptyRow()); } }

  {id:'follow_up',pt:'Follow-up',en:'Follow-up',dpt:'Aguarda confirmação',den:'Awaiting confirmation',fase:'durante'},
  {id:'confirmacao',pt:'Confirmação',en:'Confirmation',dpt:'Reserva confirmada',den:'Booking confirmed',fase:'durante'},
  {id:'cancelamento',pt:'Cancelamento',en:'Cancellation',dpt:'Pré-reserva cancelada',den:'Pre-booking cancelled',fase:'durante'},
  {id:'cobranca',pt:'Cobrança',en:'Payment Follow-up',dpt:'Serviços adicionais por regularizar',den:'Additional services pending',fase:'pos'},
  {id:'envio_factura',pt:'Envio de Factura Final',en:'Final Invoice Submission',dpt:'Emissão de factura final',den:'Final invoice issuance',fase:'pos'},
  {id:'satisfacao',pt:'Formulário de satisfação',en:'Satisfaction survey',dpt:'Pós-evento',den:'Post-event',fase:'pos'}
];

function p(){ return lang==='PT'; }
function $(id){ return document.getElementById(id); }
function show(id){ var e=$(id); if(e) e.style.display='block'; }
function hide(id){ var e=$(id); if(e) e.style.display='none'; }
function setText(id,v){ var e=$(id); if(e) e.textContent=v; }
function fmt(n){ if(isNaN(n)||n===null) return '0,00'; return n.toFixed(2).replace('.',',').replace(/\B(?=(\d{3})+(?!\d))/g,'.'); }
function parseNum(s){
  if(!s&&s!==0) return 0;
  var str=s.toString().trim().replace(/\s/g,'');
  var lc=str.lastIndexOf(','),ld=str.lastIndexOf('.');
  if(lc>ld) str=str.replace(/\./g,'').replace(',','.');
  else if(ld>lc) str=str.replace(/,/g,'');
  var n=parseFloat(str); return isNaN(n)?0:n;
}
function escHtml(s){ return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

function copyToClipboard(html,plain,btn){
  var fullHtml='<meta charset="utf-8"><html><body style="font-family:Aptos,Montserrat,Arial,sans-serif;margin:0;">'+html+'</body></html>';
  function done(){ btn.textContent=T('copied'); setTimeout(function(){ btn.textContent=T('copy'); },2500); }
  function execFallback(){
    var ok=false,container=document.createElement('div');
    container.innerHTML=html;
    container.style.cssText='position:fixed;left:-9999px;top:0;';
    document.body.appendChild(container);
    try{
      var range=document.createRange(); range.selectNodeContents(container);
      var sel=window.getSelection(); sel.removeAllRanges(); sel.addRange(range);
      ok=document.execCommand('copy');
      sel.removeAllRanges();
    }catch(e){ ok=false; }
    document.body.removeChild(container);
    if(ok) done(); else navigator.clipboard.writeText(plain).then(done).catch(function(){});
  }
  if(navigator.clipboard&&window.ClipboardItem){
    try{
      navigator.clipboard.write([new ClipboardItem({'text/html':new Blob([fullHtml],{type:'text/html'}),'text/plain':new Blob([plain],{type:'text/plain'})})]).then(done).catch(execFallback);
    }catch(e){ execFallback(); }
  } else { execFallback(); }
}

function renderCalc(){
  var showRet=entityType==='priv'?true:doRetencao;
  var showCatFora=entityType==='pub'&&doCativacao;
  var showCatHot=entityType==='pub'&&doCativacaoHot;
  renderTable('tbody-fora',foraRows,14,showRet,showCatFora);
  renderTable('tbody-hot',hotRows,7,false,showCatHot);
  updateTotals(showRet,showCatFora,showCatHot);
}
function renderTable(tbodyId,rows,ivaPct,showRet,showCat){
  var tbody=$(tbodyId); if(!tbody) return;
  var ph=T('ph-conceito'); tbody.innerHTML='';
  rows.forEach(function(row,i){
    var base=row.valor>0?(row.valor/(1+ivaPct/100)):0;
    var iva=base*(ivaPct/100),ret=showRet?base*0.065:0;
    var tr=document.createElement('tr');
    tr.innerHTML='<td style="background:#F5FFF5;"><input class="cinput" type="text" value="'+escHtml(row.conceito)+'" placeholder="'+ph+'" onchange="rowUpdate(\''+tbodyId+'\','+i+',\'conceito\',this.value)"></td>'
      +'<td style="background:#F5FFF5;"><input class="ninput" type="text" value="'+(row.valor?fmt(row.valor):'')+'" placeholder="0,00" onchange="rowUpdate(\''+tbodyId+'\','+i+',\'valor\',this.value)"></td>'
      +'<td class="calc">'+(row.valor>0?fmt(base):'0,00')+'</td>'
      +'<td class="calc" style="color:'+(ivaPct===14?'#C0392B':'#1a6b3a')+';font-weight:500;">'+(row.valor>0?fmt(iva):'0,00')+'</td>'
      +'<td class="calc" style="color:'+(showRet&&row.valor>0?BLACK:'#C4AE96')+'">'+(showRet&&row.valor>0?fmt(ret):'n/a')+'</td>';
    tbody.appendChild(tr);
  });
}
function rowUpdate(tbodyId,idx,key,val){ var rows=(tbodyId==='tbody-hot')?hotRows:foraRows; if(key==='valor') rows[idx].valor=parseNum(val); else rows[idx][key]=val; renderCalc(); }
function updateTotals(showRet,showCatFora,showCatHot){
  var foraPF=0,foraIVA=0,foraRet=0;
  foraRows.forEach(function(r){ if(r.valor>0){ var b=r.valor/1.14; foraPF+=r.valor;foraIVA+=b*0.14;foraRet+=b*0.065; } });
  var hotPF=0,hotIVA=0;
  hotRows.forEach(function(r){ if(r.valor>0){ var b=r.valor/1.07; hotPF+=r.valor;hotIVA+=b*0.07; } });
  setText('tf-fora-pf',fmt(foraPF));setText('tf-fora-iva',fmt(foraIVA));setText('tf-fora-ret',showRet?fmt(foraRet):'n/a');
  setText('tf-hot-pf',fmt(hotPF));setText('tf-hot-iva',fmt(hotIVA));
  var totalPF=foraPF+hotPF,dCatFora=showCatFora?foraIVA:0,dCatHot=showCatHot?hotIVA:0,dRet=showRet?foraRet:0;
  setText('grand-pf',fmt(totalPF)+' Kzs');
  var bd='';
  if(!showCatFora&&!showCatHot&&!showRet) bd='<div style="color:#9A918C;font-size:10px;">'+T('deduct-none')+'</div>';
  else {
    if(showCatFora) bd+='<div style="display:flex;justify-content:space-between;"><span>'+T('deduct-cat14')+'</span><span style="color:#e74c3c;">- '+fmt(dCatFora)+' Kzs</span></div>';
    if(showCatHot)  bd+='<div style="display:flex;justify-content:space-between;"><span>'+T('deduct-cat7')+'</span><span style="color:#e74c3c;">- '+fmt(dCatHot)+' Kzs</span></div>';
    if(showRet)     bd+='<div style="display:flex;justify-content:space-between;"><span>'+T('deduct-ret')+'</span><span style="color:#e74c3c;">- '+fmt(dRet)+' Kzs</span></div>';
  }
  $('grand-breakdown').innerHTML=bd;
  setText('grand-receber',fmt(totalPF-dCatFora-dCatHot-dRet)+' Kzs');
}

// ─── DIAGNÓSTICO ──────────────────────────────────────────────
function diagCalc(){
  var foraVal=parseNum($('diag-fora')?$('diag-fora').value:'');
  var hotVal=parseNum($('diag-hot')?$('diag-hot').value:'');
  var paidVal=parseNum($('diag-paid')?$('diag-paid').value:'');
  var area=$('diag-result-area'); if(!area) return;
  var pfVal=foraVal+hotVal;
  var pfDisp=$('diag-pf-display');
  if(pfDisp){ if(pfVal>0){ pfDisp.style.display='block'; pfDisp.textContent=(p()?'Total da proforma calculado: ':'Calculated invoice total: ')+fmt(pfVal)+' Kzs'; } else pfDisp.style.display='none'; }
  if(!pfVal||!paidVal){ area.innerHTML=''; return; }

  var TOL=Math.max(2,pfVal*0.0001),diff=pfVal-paidVal,isPub=diagEntityType==='pub';
  var foraBase=foraVal>0?foraVal/1.14:0,foraIVA=foraBase*0.14,foraRet=foraBase*0.065;
  var hotBase=hotVal>0?hotVal/1.07:0,hotIVA=hotBase*0.07;
  var foraIVA_w=foraVal*0.14,foraRet_w=foraVal*0.065,hotIVA_w=hotVal*0.07;
  var hotRet_b=hotBase*0.065,hotRet_w=hotVal*0.065;

  var msgs=[];
  window._diagScenarioFlag='generic';

  if(Math.abs(diff)<TOL){
    if(foraVal===0) msgs.push({t:'ok',txt:p()?'✅ Correcto. Proforma 100% do âmbito da hotelaria, sem deduções aplicáveis. Pagamento integral correcto.':'✅ Correct. Invoice 100% hotel services, no deductions apply. Full payment is correct.'});
    else msgs.push({t:'warn',txt:p()?'⚠️ O cliente pagou o valor integral sem aplicar qualquer dedução. A retenção na fonte é <strong>obrigação do pagador</strong>: se não a fizer, não representa problema para nós desde que o pagamento seja integral.':'⚠️ The client paid the full amount without deductions. Withholding is the <strong>payer\'s obligation</strong>: if they choose not to apply it, it is not a problem provided full payment is made.'});
  } else {
    var okCombos=[];
    if(isPub){
      if(foraVal>0) okCombos.push({val:foraIVA,txt:p()?'✅ Correcto. <strong>Só cativação de IVA 14%</strong> sobre serviços fora do âmbito da hotelaria, calculada correctamente sobre a base de incidência (÷1,14).':'✅ Correct. <strong>VAT withholding 14% only</strong> on non-hotel services, correctly calculated on the tax base (÷1.14).'});
      if(hotVal>0) okCombos.push({val:hotIVA,txt:p()?'✅ Correcto. <strong>Só cativação de IVA 7%</strong> sobre serviços do âmbito da hotelaria, calculada correctamente sobre a base de incidência (÷1,07).':'✅ Correct. <strong>VAT withholding 7% only</strong> on hotel services, correctly calculated on the tax base (÷1.07).'});
      if(foraVal>0) okCombos.push({val:foraRet,txt:p()?'✅ Correcto. <strong>Só retenção de Imposto Industrial (6,5%)</strong> sobre a base de incidência dos serviços fora do âmbito da hotelaria.':'✅ Correct. <strong>Industrial tax retention only (6.5%)</strong> on the tax base of non-hotel services.'});
      if(foraVal>0&&hotVal>0) okCombos.push({val:foraIVA+hotIVA,txt:p()?'✅ Correcto. <strong>Cativação de IVA 14% sobre serviços fora do âmbito da hotelaria e 7% sobre serviços do âmbito da hotelaria</strong>, ambas calculadas correctamente sobre a respectiva base de incidência.':'✅ Correct. <strong>VAT withholding 14% on non-hotel services and 7% on hotel services</strong>, both correctly calculated on the respective tax base.'});
      if(foraVal>0) okCombos.push({val:foraIVA+foraRet,txt:p()?'✅ Correcto. <strong>Cativação de IVA 14% e retenção industrial 6,5%</strong> sobre serviços fora do âmbito da hotelaria, ambas calculadas correctamente sobre a base de incidência.':'✅ Correct. <strong>VAT withholding 14% and industrial tax retention 6.5%</strong> on non-hotel services, both correctly calculated on the tax base.'});
      if(foraVal>0&&hotVal>0) okCombos.push({val:hotIVA+foraRet,txt:p()?'✅ Correcto. <strong>Cativação de IVA 7% sobre serviços do âmbito da hotelaria e retenção de Imposto Industrial 6,5% sobre serviços fora do âmbito da hotelaria</strong>, ambas calculadas correctamente sobre a respectiva base de incidência.':'✅ Correct. <strong>VAT withholding 7% on hotel services and industrial tax retention 6.5% on non-hotel services</strong>, both correctly calculated on the respective tax base.'});
      if(foraVal>0&&hotVal>0) okCombos.push({val:foraIVA+hotIVA+foraRet,txt:p()?'✅ Correcto. <strong>Cativação de IVA 14% e 7% e retenção de Imposto Industrial 6,5%</strong>, montante máximo de deduções, todas calculadas correctamente sobre a respectiva base de incidência.':'✅ Correct. <strong>VAT withholding 14% and 7% plus industrial tax retention 6.5%</strong>, the maximum possible deductions, all correctly calculated on the respective tax base.'});
    } else if(foraVal>0){
      okCombos.push({val:foraRet,txt:p()?'✅ Correcto. <strong>Só retenção de Imposto Industrial (6,5%)</strong> sobre a base de incidência dos serviços fora do âmbito da hotelaria.':'✅ Correct. <strong>Industrial tax retention only (6.5%)</strong> on the tax base of non-hotel services.'});
    }
    var okHit=okCombos.find(function(c){ return c.val>TOL&&Math.abs(diff-c.val)<TOL; });
    var scenarioFlag='generic';
    if(okHit){ msgs.push({t:'ok',txt:okHit.txt}); }
    else {
    var errs=[],matched=false;
    if(!isPub){
      var looksLikeCat=Math.abs(diff-foraIVA)<TOL||Math.abs(diff-foraIVA_w)<TOL||Math.abs(diff-hotIVA)<TOL||Math.abs(diff-hotIVA_w)<TOL||Math.abs(diff-foraVal*0.07)<TOL||Math.abs(diff-(foraVal/1.07)*0.07)<TOL||Math.abs(diff-(foraVal/1.14)*0.07)<TOL||Math.abs(diff-(foraIVA+foraRet))<TOL;
      if(looksLikeCat){ errs.push(p()?'❌ <strong>Parece ter sido efectuada cativação de IVA, o que não é permitido a entidades privadas.</strong> A cativação é exclusiva de agentes cativadores (Estado e organismos públicos), ao abrigo da Lei 7/19 e Lei 17/19. Uma entidade privada só pode efectuar retenção de Imposto Industrial (6,5%) sobre serviços fora do âmbito da hotelaria, calculada sobre a base de incidência.':'❌ <strong>It appears VAT withholding was applied, which is not permitted for private entities.</strong> VAT withholding is exclusive to withholding agents (State and public bodies) under Law 7/19 and Law 17/19. A private entity may only apply industrial tax retention (6.5%) on non-hotel services, calculated on the tax base.'); matched=true; scenarioFlag='catPriv'; }
    }
    var foraIVA_taxa7_full=foraVal*0.07,foraIVA_taxa7_b107=(foraVal/1.07)*0.07,foraIVA_taxa7_b114=(foraVal/1.14)*0.07;
    if(!matched&&foraVal>0&&(Math.abs(diff-foraIVA_taxa7_full)<TOL||Math.abs(diff-foraIVA_taxa7_b107)<TOL||Math.abs(diff-foraIVA_taxa7_b114)<TOL)){
      errs.push(p()?'❌ <strong>Taxa de IVA errada aplicada à cativação.</strong> O cliente aplicou a taxa de 7% sobre serviços fora do âmbito da hotelaria, que têm IVA de 14%. '+(Math.abs(diff-foraIVA_taxa7_full)<TOL?'Adicionalmente, o cálculo foi feito sobre o valor total ('+fmt(foraVal)+' × 7% = '+fmt(foraIVA_taxa7_full)+' Kzs) em vez da base de incidência. ':'')+'A cativação correcta seria: '+fmt(foraVal)+' ÷ 1,14 = '+fmt(foraBase)+' Kzs → Cativação correcta = '+fmt(foraIVA)+' Kzs.':'❌ <strong>Wrong VAT rate applied to withholding.</strong> The client applied the 7% rate to non-hotel services, which carry 14% VAT. '+(Math.abs(diff-foraIVA_taxa7_full)<TOL?'Additionally, the calculation was done on the full value ('+fmt(foraVal)+' × 7% = '+fmt(foraIVA_taxa7_full)+' Kzs) instead of the tax base. ':'')+'Correct: '+fmt(foraVal)+' ÷ 1.14 = '+fmt(foraBase)+' Kzs → Correct withholding = '+fmt(foraIVA)+' Kzs.'); matched=true; scenarioFlag='catWrongRate';
    }
    if(!matched&&hotVal>0&&Math.abs(diff-hotIVA_w)<TOL){ errs.push(p()?'❌ <strong>Cativação de IVA 7% aplicada sobre serviços do âmbito da hotelaria, calculada sobre o valor total</strong> ('+fmt(hotVal)+' × 7% = '+fmt(hotIVA_w)+' Kzs) em vez da base de incidência. A cativação de IVA 7% sobre serviços do âmbito da hotelaria é permitida para agentes cativadores, mas o cálculo correcto seria: '+fmt(hotVal)+' ÷ 1,07 = '+fmt(hotBase)+' Kzs → Cativação correcta = '+fmt(hotIVA)+' Kzs.':'❌ <strong>VAT withholding 7% applied to hotel services, calculated on the full value</strong> ('+fmt(hotVal)+' × 7% = '+fmt(hotIVA_w)+' Kzs) instead of the tax base. VAT withholding 7% on hotel services is permitted for withholding agents, but the correct calculation would be: '+fmt(hotVal)+' ÷ 1.07 = '+fmt(hotBase)+' Kzs → Correct withholding = '+fmt(hotIVA)+' Kzs.'); matched=true; }
    if(!matched&&foraVal>0&&Math.abs(diff-foraIVA_w)<TOL){ errs.push(p()?'❌ <strong>Cativação de IVA 14% aplicada sobre serviços fora do âmbito da hotelaria, calculada sobre o valor total</strong> ('+fmt(foraVal)+' × 14% = '+fmt(foraIVA_w)+' Kzs) em vez da base de incidência. O cálculo correcto seria: '+fmt(foraVal)+' ÷ 1,14 = '+fmt(foraBase)+' Kzs → Cativação correcta = '+fmt(foraIVA)+' Kzs.':'❌ <strong>VAT withholding 14% applied to non-hotel services, calculated on the full value</strong> ('+fmt(foraVal)+' × 14% = '+fmt(foraIVA_w)+' Kzs) instead of the tax base. The correct calculation would be: '+fmt(foraVal)+' ÷ 1.14 = '+fmt(foraBase)+' Kzs → Correct withholding = '+fmt(foraIVA)+' Kzs.'); matched=true; }
    if(!matched&&foraVal>0&&hotVal>0){
      // Cliente juntou tudo e aplicou 14% sobre o total (ou base total)
      var totalIVA14_full=pfVal*0.14;
      var totalBase114=pfVal/1.14;
      var totalIVA14_base=totalBase114*0.14;
      if(Math.abs(diff-totalIVA14_full)<TOL||Math.abs(diff-totalIVA14_base)<TOL){
        errs.push(p()

    if(!matched&&hotVal>0&&(Math.abs(diff-hotRet_b)<TOL||Math.abs(diff-hotRet_w)<TOL||Math.abs(diff-(foraRet+hotRet_b))<TOL||Math.abs(diff-(foraRet+hotRet_w))<TOL||Math.abs(diff-((foraBase+hotBase)*0.065))<TOL||Math.abs(diff-(pfVal*0.065))<TOL)){
      var retOnHotelBaseWrong=Math.abs(diff-hotRet_w)<TOL||Math.abs(diff-(foraRet+hotRet_w))<TOL||Math.abs(diff-(pfVal*0.065))<TOL;
      errs.push(p()
        ?'❌ <strong>Retenção de Imposto Industrial aplicada sobre serviços do âmbito da hotelaria.</strong> Os serviços do âmbito da hotelaria não estão sujeitos a retenção na fonte, ao abrigo da Lei 19/14 e Lei 26/20 (art.º 67.º).'+(retOnHotelBaseWrong?' Adicionalmente, a retenção foi calculada sobre o valor com IVA, quando deve incidir sobre a base de incidência (÷1,14).':'')+' A retenção correcta seria apenas sobre os serviços fora do âmbito da hotelaria, sobre a respectiva base de incidência: '+fmt(foraVal)+' ÷ 1,14 = '+fmt(foraBase)+' Kzs → Retenção correcta = '+fmt(foraRet)+' Kzs.'

    if(!matched&&foraVal>0&&hotVal>0){
      // Whole proforma treated as fora hotelaria: (14%+6.5%) on pfVal/1.14

          ?'❌ <strong>Toda a proforma tratada como Serviços fora do âmbito da hotelaria.</strong> O cliente calculou cativação de IVA 14% e retenção 6,5% sobre a base de incidência do total da proforma ('+fmt(pfVal)+' ÷ 1,14 = '+fmt(pfBase114)+' Kzs), sem distinguir os Serviços do âmbito da hotelaria. Os Serviços do âmbito da hotelaria estão sujeitos a cativação de IVA a 7% (não 14%) e não estão sujeitos a retenção. O correcto seria: cativação 14% sobre '+fmt(foraVal)+' ÷ 1,14 = '+fmt(foraBase)+' Kzs → '+fmt(foraIVA)+' Kzs; cativação 7% sobre '+fmt(hotVal)+' ÷ 1,07 = '+fmt(hotBase)+' Kzs → '+fmt(hotIVA)+' Kzs; retenção 6,5% sobre '+fmt(foraBase)+' Kzs → '+fmt(foraRet)+' Kzs. Total correcto = '+fmt(foraIVA+hotIVA+foraRet)+' Kzs.'
          :'❌ <strong>Entire invoice treated as Non-hotel services.</strong> The client calculated VAT withholding 14% and retention 6.5% on the tax base of the total invoice ('+fmt(pfVal)+' ÷ 1.14 = '+fmt(pfBase114)+' Kzs), without distinguishing Hotel services. Hotel services are subject to VAT withholding at 7% (not 14%) and are not subject to retention. Correct: withholding 14% on '+fmt(foraVal)+' ÷ 1.14 = '+fmt(foraBase)+' Kzs → '+fmt(foraIVA)+' Kzs; withholding 7% on '+fmt(hotVal)+' ÷ 1.07 = '+fmt(hotBase)+' Kzs → '+fmt(hotIVA)+' Kzs; retention 6.5% on '+fmt(foraBase)+' Kzs → '+fmt(foraRet)+' Kzs. Total correct = '+fmt(foraIVA+hotIVA+foraRet)+' Kzs.');

        {val:hotIVA_w+foraRet_w, lbl:p()?'Cativação IVA 7% (hotelaria) + Retenção 6,5% (fora hotelaria), ambas com base errada':'VAT withholding 7% (hotel) + Retention 6.5% (non-hotel), both on wrong base', corrPT:fmt(hotIVA)+' + '+fmt(foraRet)+' = '+fmt(hotIVA+foraRet), corrEN:fmt(hotIVA)+' + '+fmt(foraRet)+' = '+fmt(hotIVA+foraRet)},

      ];
      var hit=combos.find(function(c){ return Math.abs(c.val)>TOL&&Math.abs(diff-c.val)<TOL; });
      if(hit){
        errs.push(p()
          ?'❌ <strong>'+hit.lbl+', calculadas sobre o valor total em vez da base de incidência.</strong> As deduções foram aplicadas sobre os valores com IVA ('+fmt(foraVal)+' e '+fmt(hotVal)+' Kzs). O cálculo correcto incide sempre sobre a base de incidência (valor ÷ 1,taxa). Valores correctos: '+hit.corrPT+' Kzs.'
          :'❌ <strong>'+hit.lbl+', calculated on the full value instead of the tax base.</strong> The deductions were applied on the values including VAT ('+fmt(foraVal)+' and '+fmt(hotVal)+' Kzs). The correct calculation must always be based on the tax base (value ÷ 1.rate). Correct values: '+hit.corrEN+' Kzs.');
        matched=true;
      }

    if(!matched&&foraVal>0){
      var combos1=[

      ];
      var hit1=combos1.find(function(c){ return Math.abs(c.val)>TOL&&Math.abs(diff-c.val)<TOL; });
      if(hit1){

          ?'❌ <strong>'+hit1.lbl+'.</strong> O cálculo correcto incide sobre a base de incidência ('+fmt(foraVal)+' ÷ 1,14 = '+fmt(foraBase)+' Kzs). Valores correctos: '+hit1.corrPT+' Kzs.'

    errs.forEach(function(e){ msgs.push({t:e.indexOf('⚠️')===0?'warn':'err',txt:e}); });
    }
    window._diagScenarioFlag=scenarioFlag;
  }

  // Scenarios
  var hasFora=foraVal>0,hasHot=hotVal>0,scenarios=[];
  if(isPub){
    if(hasFora) scenarios.push({lbl:p()?'Opção A: Só cativação IVA 14% (fora do âmbito da hotelaria)':'Option A: VAT withholding 14% only (non-hotel)',val:pfVal-foraIVA,detail:(p()?'Cativação 14%: ':'Withholding 14%: ')+fmt(foraIVA)+' Kzs'});
    if(hasHot)  scenarios.push({lbl:p()?'Opção B: Só cativação IVA 7% (hotelaria)':'Option B: VAT withholding 7% only (hotel)',val:pfVal-hotIVA,detail:(p()?'Cativação 7%: ':'Withholding 7%: ')+fmt(hotIVA)+' Kzs'});
    if(hasFora) scenarios.push({lbl:p()?'Opção C: Só retenção industrial 6,5% (fora do âmbito da hotelaria)':'Option C: Industrial retention 6.5% only (non-hotel)',val:pfVal-foraRet,detail:(p()?'Retenção 6,5%: ':'Retention 6.5%: ')+fmt(foraRet)+' Kzs'});
    if(hasFora&&hasHot) scenarios.push({lbl:p()?'Opção A+B: Cativação IVA 14% + cativação IVA 7%':'Option A+B: Withholding 14% + Withholding 7%',val:pfVal-foraIVA-hotIVA,detail:(p()?'Cativação 14%: ':'Whld 14%: ')+fmt(foraIVA)+' + '+(p()?'Cativação 7%: ':'Whld 7%: ')+fmt(hotIVA)+' Kzs'});

    if(hasFora&&hasHot) scenarios.push({lbl:p()?'Opção B+C: Cativação IVA 7% + retenção industrial':'Option B+C: Withholding 7% + Industrial retention',val:pfVal-hotIVA-foraRet,detail:(p()?'Cativação 7%: ':'Whld 7%: ')+fmt(hotIVA)+' + '+(p()?'Retenção: ':'Ret: ')+fmt(foraRet)+' Kzs'});
    if(hasFora&&hasHot) scenarios.push({lbl:p()?'Opção A+B+C: Máximo (cativação 14% + 7% + retenção)':'Option A+B+C: Maximum (whld 14% + 7% + retention)',val:pfVal-foraIVA-hotIVA-foraRet,detail:(p()?'Cativação 14%: ':'Whld 14%: ')+fmt(foraIVA)+' + '+(p()?'Cativação 7%: ':'Whld 7%: ')+fmt(hotIVA)+' + '+(p()?'Retenção: ':'Ret: ')+fmt(foraRet)+' Kzs'});

  }

  html+='</div>';

  // Guardar estado
  window._diagState={pfVal:pfVal,paidVal:paidVal,foraVal:foraVal,hotVal:hotVal,diff:diff,isPub:isPub,
    foraBase:foraBase,foraIVA:foraIVA,foraRet:foraRet,hotBase:hotBase,hotIVA:hotIVA,

  // Botão email, aparece para err e warn
  var hasError=msgs.some(function(m){ return m.t==='err'; });
  var hasWarn=msgs.some(function(m){ return m.t==='warn'; });
  var emailArea=$('diag-email-area');
  if(hasError||hasWarn){

function generateDiagEmail(){

      ?'Exmos. Srs.,\n\nEsperamos que este e-mail o encontre bem.\n\nNo seguimento do pagamento recebido referente à nossa factura, verificámos uma divergência no valor liquidado que importa clarificar.\n\n[TABELA]\n\nA nossa factura inclui dois tipos de serviços com enquadramento fiscal distinto: Serviços fora do âmbito da hotelaria ('+fmt(d.foraVal)+' Kzs, sujeitos a IVA de 14%) e Serviços do âmbito da hotelaria ('+fmt(d.hotVal)+' Kzs, sujeitos a IVA de 7%).\n\nVerificámos que as deduções foram calculadas aplicando cativação de IVA 14% e retenção de 6,5% sobre a base de incidência do total da proforma ('+fmt(d.pfVal)+' ÷ 1,14 = '+fmt(pfBase114)+' Kzs), sem distinguir os dois tipos de serviço. Esta abordagem não corresponde ao enquadramento legal: os Serviços do âmbito da hotelaria estão sujeitos a cativação de IVA à taxa de 7% (não 14%) e não estão sujeitos a retenção de Imposto Industrial.\n\nAs deduções correctas seriam: cativação de IVA 14% sobre os Serviços fora do âmbito da hotelaria ('+fmt(d.foraVal)+' ÷ 1,14 = '+fmt(d.foraBase)+' Kzs → '+fmt(d.foraIVA)+' Kzs); cativação de IVA 7% sobre os Serviços do âmbito da hotelaria ('+fmt(d.hotVal)+' ÷ 1,07 = '+fmt(d.hotBase)+' Kzs → '+fmt(d.hotIVA)+' Kzs); retenção de Imposto Industrial 6,5% sobre os Serviços fora do âmbito da hotelaria ('+fmt(d.foraBase)+' Kzs → '+fmt(d.foraRet)+' Kzs). Total correcto = '+fmt(corrTotal)+' Kzs.\n\n'+(isOverP?'O valor recebido ('+fmt(d.paidVal)+' Kzs) é superior ao que resultaria da aplicação correcta das deduções ('+fmt(corrPaid)+' Kzs). O valor pago a mais, no montante de '+fmt(Math.abs(diffP))+' Kzs, poderá ser regularizado a favor da vossa entidade, nomeadamente através de crédito em factura futura.':'O valor actualmente em falta é de '+fmt(diffP)+' Kzs. Solicita-se a regularização com a maior brevidade possível, acompanhada do respectivo comprovativo de pagamento.')+'\n\nFicamos ao dispor para qualquer esclarecimento adicional.'
      :'Dear Sir/Madam,\n\nWe hope this email finds you well.\n\nFollowing the payment received for our invoice, we have identified a discrepancy in the amount settled that we would like to clarify.\n\n[TABELA]\n\nOur invoice includes two types of services with different tax treatment: Non-hotel services ('+fmt(d.foraVal)+' Kzs, subject to 14% VAT) and Hotel services ('+fmt(d.hotVal)+' Kzs, subject to 7% VAT).\n\nWe have noted that the deductions were calculated by applying VAT withholding at 14% and retention at 6.5% on the tax base of the total invoice ('+fmt(d.pfVal)+' ÷ 1.14 = '+fmt(pfBase114)+' Kzs), without distinguishing between the two types of service. This approach does not correspond to the applicable legal framework: Hotel services are subject to VAT withholding at 7% (not 14%) and are not subject to Industrial Tax retention.\n\nThe correct deductions would be: VAT withholding 14% on Non-hotel services ('+fmt(d.foraVal)+' ÷ 1.14 = '+fmt(d.foraBase)+' Kzs → '+fmt(d.foraIVA)+' Kzs); VAT withholding 7% on Hotel services ('+fmt(d.hotVal)+' ÷ 1.07 = '+fmt(d.hotBase)+' Kzs → '+fmt(d.hotIVA)+' Kzs); Industrial Tax retention 6.5% on Non-hotel services ('+fmt(d.foraBase)+' Kzs → '+fmt(d.foraRet)+' Kzs). Total correct = '+fmt(corrTotal)+' Kzs.\n\n'+(isOverP?'The amount received ('+fmt(d.paidVal)+' Kzs) is higher than what would result from the correct application of the deductions ('+fmt(corrPaid)+' Kzs). The overpaid amount of '+fmt(Math.abs(diffP))+' Kzs may be credited in favour of your entity, namely against a future invoice.':'The amount currently outstanding is '+fmt(diffP)+' Kzs. We kindly request that the outstanding amount be settled at the earliest convenience, with the corresponding proof of payment.')+'\n\nWe remain at your disposal for any further clarification.';
  } else {
    tableHtml=tbl1([
      {lbl:is?'Valor da proforma':'Invoice value',val:fmt(d.pfVal)+' Kzs'},
      {lbl:is?'Valor recebido':'Amount received',val:fmt(d.paidVal)+' Kzs'},
      {lbl:is?'Valor deduzido (não identificado)':'Amount deducted (not identified)',val:'- '+fmt(missing)+' Kzs',color:'#e74c3c',highlight:true},
    ],is?'Análise do Pagamento':'Payment Analysis');
    body=is
      ?'Exmos. Srs.,\n\nEsperamos que este e-mail o encontre bem.\n\nNo seguimento do pagamento recebido referente à nossa factura, verificámos que foi efectuada uma dedução no montante de '+fmt(missing)+' Kzs, cujo fundamento não nos foi possível identificar com base nos elementos de que dispomos.\n\n[TABELA]\n\nAgradecíamos que nos pudessem esclarecer a que título foi efectuada esta dedução, indicando nomeadamente o tipo de retenção ou cativação aplicada e a respectiva base de cálculo, de forma a podermos proceder à análise e regularização da situação.\n\nFicamos a aguardar o vosso retorno e permanecemos ao dispor para qualquer esclarecimento adicional.'
      :'Dear Sir/Madam,\n\nWe hope this email finds you well.\n\nFollowing the payment received for our invoice, we have noted that a deduction of '+fmt(missing)+' Kzs was applied, the basis for which we were unable to identify from the information available to us.\n\n[TABELA]\n\nWe would be grateful if you could clarify the grounds for this deduction, indicating in particular the type of retention or withholding applied and the respective calculation basis, so that we may proceed with the necessary analysis and settlement.\n\nWe look forward to your response and remain at your disposal for any further clarification.';
  }

  renderDiagEmail(subject,body,tableHtml);
}

function renderDiagEmail(subject,body,tableHtml){

function copyDiagEmail(){

}

  if(curType==='follow_up'){ var de=f.dataEvento||'[data do evento]',dl=f.dataLimite||'[data limite]'; if((f.followUpModo||'proximo')==='conflito') return {text:is?'Exmos. Srs.,\n\nEsperamos que este e-mail o encontre bem.\n\nNo seguimento da proposta anteriormente enviada, gostaríamos de informar que recebemos um novo pedido de reserva para as mesmas datas ('+de+'), pelo que a vossa proposta passa a estar em risco de indisponibilidade.\n\nNeste sentido, solicitamos com carácter de urgência a vossa confirmação oficial. A confirmação definitiva será formalizada mediante o envio do comprovativo de pagamento de 50% do valor total da proposta.\n\nAgradecemos antecipadamente pela vossa atenção e pronta resposta.':'Dear '+nome+',\n\nWe hope this email finds you well.\n\nFollowing the proposal previously sent, we wish to inform you that we have received a new booking request for the same dates ('+de+'), and your proposal is now at risk of unavailability.\n\nWe urgently request your official confirmation. Final confirmation will be formalised upon receipt of Proof of Payment (PoP) of 50% of the total proposal value.\n\nWe thank you in advance for your attention and prompt response.',table:null}; return {text:is?'Exmos. Srs.,\n\nEsperamos que este e-mail o(a) encontre bem.\n\nNo seguimento da proposta anteriormente enviada, referente ao evento previsto para os dias '+de+', gostaríamos de saber se já existe alguma decisão relativamente à sua realização.\n\nCaso pretendam avançar com a reserva, agradecemos o envio da respectiva confirmação e do comprovativo de pagamento, de forma a podermos dar seguimento aos procedimentos necessários para a formalização da reserva.\n\nGostaríamos de reiterar a importância de receber o vosso feedback até '+dl+'. Na ausência de resposta até essa data, a presente consulta será removida do nosso sistema.\n\nAgradecemos desde já a vossa atenção e ficamos a aguardar o vosso feedback.':'Dear '+nome+',\n\nWe hope this email finds you well.\n\nFollowing the proposal previously sent, regarding the event scheduled for '+de+', we would like to know whether a decision has already been made regarding its confirmation.\n\nShould you wish to proceed with the booking, we kindly ask that you send the corresponding confirmation and proof of payment (PoP), so that we may proceed with the necessary procedures to formalise the reservation.\n\nWe would like to reiterate the importance of receiving your feedback by '+dl+'. Should we not receive a response by that date, the present enquiry will be removed from our system.\n\nWe thank you in advance for your attention and we look forward to your feedback.',table:null}; }

  if(curType==='confirmacao'){ var de2=f.dataEvento||'[data do evento]',df=(f.dadosFiscaisOpcao||'conhecidos')==='falta'?(is?'\n\nFicamos a aguardar, com a maior brevidade possível, o envio dos vossos dados fiscais (Entidade, NIF e Morada Fiscal). Caso não nos seja facultada esta informação dentro do prazo legal, a factura será emitida sob designação genérica de "Consumidor Final".':'\n\nWe kindly ask that you provide your fiscal details (Entity, Tax ID and Fiscal Address) at your earliest convenience. Should this information not be provided within the legal timeframe, the invoice will be issued under the generic designation of "Final Consumer".'):(is?'\n\nAproveitamos para reconfirmar que o evento será facturado com os seguintes dados fiscais:\n\nEntidade: '+(f.entidade||'[Entidade]')+'\nNIF: '+(f.nif||'[NIF]')+'\nMorada Fiscal: '+(f.morada||'[Morada]'):'\n\nWe would also like to reconfirm that the event will be invoiced under the following fiscal details:\n\nEntity: '+(f.entidade||'[Entity]')+'\nTax ID: '+(f.nif||'[Tax ID]')+'\nFiscal Address: '+(f.morada||'[Address]')); return {text:is?'Exmos. Srs.,\n\nAgradecemos a vossa preferência pelo Grupo TD Hotels e o envio do comprovativo de pagamento. Temos o prazer de confirmar a vossa reserva para a realização do vosso evento, previsto para '+de2+'.\n\nAssim que o nosso departamento financeiro confirmar a entrada dos valores, iremos partilhar a factura final.'+df+'\n\nFicamos ao dispor para qualquer esclarecimento adicional.':'Dear '+nome+',\n\nWe thank you for your preference for TD Hotels Group and for submitting the Proof of Payment (PoP). We are pleased to confirm your booking for your event, scheduled for '+de2+'.\n\nOnce our Finance Department confirms receipt of the funds, we will issue the final invoice.'+df+'\n\nWe remain at your disposal for any further clarification.',table:null}; }

  if(curType==='cancelamento'){
    var dc=f.dataEvento||'[data do evento]';
    return {text:is?'Exmos. Srs.,\n\nEsperamos que este e-mail o encontre bem.\n\nVimos por este meio informar que, não tendo sido recebida confirmação oficial até à data limite estabelecida, e existindo um outro pedido de reserva para as mesmas datas que entretanto foi confirmado, procedemos ao cancelamento da pré-reserva referente ao evento previsto para '+dc+'.\n\nCaso pretenda reagendar o evento ou necessite de qualquer outra assistência, estamos inteiramente à disposição para ajudar.\n\nAgradecemos a compreensão.':'Dear '+nome+',\n\nWe hope this email finds you well.\n\nWe wish to inform you that, as no official confirmation was received by the established deadline, and given that another booking request for the same dates has since been confirmed, we have proceeded with the cancellation of the pre-booking for the event scheduled for '+dc+'.\n\nShould you wish to reschedule the event or require any further assistance, we remain entirely at your disposal.\n\nThank you for your understanding.',table:null};

  if(curType==='cobranca'){

    var valStr=f.valor?(is?' no valor de '+f.valor+' Kzs':' in the amount of '+f.valor+' Kzs'):'';
    var docRefPT=doc==='factura'?'Factura n.\u00ba '+(f.numDoc||'[n\u00ba]'):'Proforma referente a servi\u00e7os adicionais prestados';
    var docRefEN=doc==='factura'?'Invoice no. '+(f.numDoc||'[no.]'):'Proforma for additional services rendered';
    return {text:is
      ?'Exmos. Srs.,\n\nNo seguimento do evento realizado em '+de3+', encontra-se pendente de liquida\u00e7\u00e3o o valor referente \u00e0 '+docRefPT+valStr+'.\n\nAgradecemos que procedam \u00e0 regulariza\u00e7\u00e3o e ao envio do respectivo comprovativo de pagamento com a maior brevidade poss\u00edvel.\n\nFicamos ao dispor para qualquer esclarecimento adicional.'
      :'Dear '+nome+',\n\nFollowing the event held on '+de3+', the amount related to the '+docRefEN+valStr+' remains pending settlement.\n\nWe kindly ask that you proceed with payment and share the corresponding proof of payment at the earliest convenience.\n\nWe remain at your disposal for any further clarification.',table:null};

  if(curType==='satisfacao'){ var ih='<a href="https://bit.ly/QuestionarioHCTAEventos" target="_blank"><img src="https://i.imgur.com/L0EkdiH.jpeg" alt="Questionario Satisfacao HCTA" style="width:100%;max-width:600px;display:block;border:none;"></a><div style="background:#F0EAE3;border:1px dashed #887157;padding:14px;font-size:12px;color:#5A5250;margin-top:8px;border-radius:3px;"><strong style="color:#887157;">'+(is?'Nota para a equipa:':'Team note:')+'</strong> '+(is?'Se a imagem não aparecer no Outlook após colar, inserir manualmente: Inserir → Imagens → Este dispositivo.':'If the image does not appear in Outlook after pasting, insert manually: Insert → Images → This device.')+' <a href="https://i.imgur.com/L0EkdiH.jpeg" download style="color:#887157;font-weight:600;">Download</a> | <a href="https://bit.ly/QuestionarioHCTAEventos" style="color:#887157;">https://bit.ly/QuestionarioHCTAEventos</a></div>'; return {text:is?'Exmos. Srs.,\n\nFoi um gosto receber o seu evento no nosso hotel! Esperamos que tenha sido produtivo e tudo tenha correspondido às suas expectativas.\n\nPara nós, cada detalhe conta, e a sua opinião faz toda a diferença. Preparámos um questionário rápido, que não levará mais do que 2 minutos.\n\n[IMAGEM]\n\nMuito obrigados pela sua colaboração e confiança.\n\nEstamos ao dispor para qualquer questão adicional.':'Dear '+nome+',\n\nIt was a pleasure to host your event at our hotel! We hope it was productive and that everything met your expectations.\n\nEvery detail matters to us, and your opinion makes all the difference. We have prepared a quick questionnaire, which will take no more than 2 minutes.\n\n[IMAGEM]\n\nThank you very much for your collaboration and trust.\n\nWe remain at your disposal for any further questions.',table:null,imgHtml:ih}; }

function renderParagraphs(text,result,forOutlook){ var html='',fs=forOutlook?'14px':'13px'; text.split('\n\n').forEach(function(pp){ if(pp==='[TABELA]'&&result.table){ html+='<div style="margin:16px 0;">'+result.table+'</div>'; } else if(pp==='[IMAGEM]'&&result.imgHtml){ html+='<div style="margin:16px 0;">'+result.imgHtml+'</div>'; } else if(pp.indexOf('[NOTAS]')===0){ var lines=pp.replace('[NOTAS]','').split('\n').filter(function(l){ return l.length>0; }); html+='<p style="margin:0 0 4px;font-size:'+fs+';line-height:1.8;color:#231F20;"><strong>Notas:</strong></p>'; lines.forEach(function(ln){ html+='<p style="margin:0;font-size:11px;line-height:1.6;color:#231F20;">'+ln+'</p>'; }); html+='<p style="margin:0 0 14px;"></p>'; } else { html+='<p style="margin:0 0 14px;font-size:'+fs+';line-height:1.8;color:#231F20;">'+pp.replace(/\n/g,'<br>')+'</p>'; } }); return html; }
function generateEmail(){ var result=buildEmail(); if(!result||!result.text) return; emailResult=result; hide('formview');show('resultview'); setText('result-label',T('ready'));setText('result-title',T('email-generated'));setText('copy-btn',T('copy'));setText('edit-btn',T('edit')); $('email-preview').innerHTML=renderParagraphs(result.text,result,false); }
function copyEmail(){ if(!emailResult) return; var html=renderParagraphs(emailResult.text,emailResult,true),plain=emailResult.text.replace('[TABELA]','(tabela incluida)').replace('[IMAGEM]','(imagem incluida)').replace('[NOTAS]','Notas:\n'),btn=$('copy-btn'); copyToClipboard(html,plain,btn); }
function extractData(){ var btn=$('extract-btn'); if(!btn||!clientTxt.trim()) return; var is=p(); btn.textContent=is?'A extrair...':'Extracting...'; btn.disabled=true; fetch('https://api.anthropic.com/v1/messages',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:1000,messages:[{role:'user',content:'Extrai do seguinte email os campos. Responde APENAS em JSON puro sem backticks. Se nao mencionado usa null.\nCampos: nome,entidade,nif,morada,nomeEvento,dataEvento,horario,participantes,contacto,telEmail,montagem,desmontagem,fornecedores,disposicao,av,cb,almoco,jantar,cocktail,outros\nEmail:\n'+clientTxt}]})}).then(function(r){ return r.json(); }).then(function(d){ var txt=d.content?d.content.map(function(i){ return i.text||''; }).join(''):''; var parsed=JSON.parse(txt.replace(/```json|```/g,'').trim()); Object.keys(parsed).forEach(function(k){ if(parsed[k]) fields[k]=parsed[k]; }); var keys=[['nome','Nome'],['entidade','Entidade'],['nif','NIF'],['nomeEvento','Evento'],['dataEvento','Data'],['horario','Horário'],['participantes','Participantes']]; var found=keys.filter(function(kv){ return fields[kv[0]]; }).map(function(kv){ return '<div style="margin-bottom:3px;"><strong>'+kv[1]+':</strong> '+fields[kv[0]]+'</div>'; }).join(''); var er=$('extract-result'); if(er) er.innerHTML=found?'<div style="background:#F0EAE3;border:1px solid #DDD4C8;border-radius:3px;padding:10px 14px;margin-bottom:16px;font-size:12px;">'+found+'<div style="margin-top:8px;color:#9A918C;font-size:10px;">'+(is?'Verifica os dados antes de gerar.':'Review before generating.')+'</div></div>':''; btn.textContent=is?'Extrair dados automaticamente':'Extract data automatically'; btn.disabled=false; }).catch(function(e){ var er=$('extract-result'); if(er) er.innerHTML='<div style="background:#fdecea;border:1px solid #e74c3c;border-radius:3px;padding:10px 14px;margin-bottom:16px;font-size:12px;color:#c0392b;">Erro ao extrair: '+e.message+'</div>'; btn.textContent=is?'Extrair dados automaticamente':'Extract data automatically'; btn.disabled=false; }); }

refreshAll();
